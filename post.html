<!DOCTYPE html>
<html lang="vi" class="dark scroll-smooth">
<head>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%2300e58f' d='M211.5 5.5c24.5-7.3 50.5-7.3 75 0l160 48c22.4 6.7 37.5 27.6 37.5 50.5s-15.1 43.8-37.5 50.5l-160 48c-24.5 7.3-50.5 7.3-75 0l-160-48C29.1 147.8 14 126.9 14 104s15.1-43.8 37.5-50.5l160-48zM14 266.3l48.4-14.5c21.8 19 50 31.8 81 37.8L59.2 314.8C36.8 321.5 21.7 342.4 21.7 365.3s15.1 43.8 37.5 50.5l160 48c24.5 7.3 50.5 7.3 75 0l160-48c22.4-6.7 37.5-27.6 37.5-50.5s-15.1-43.8-37.5-50.5l-84.2-25.2c31-6 59.2-18.8 81-37.8l48.4 14.5c22.4 6.7 37.5 27.6 37.5 50.5s-15.1 43.8-37.5 50.5l-160 48c-24.5 7.3-50.5 7.3-75 0l-160-48C29.1 395.8 14 374.9 14 352s15.1-43.8 37.5-50.5z'/%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Article - Trading Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { accent: '#00e58f' }, 
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], serif: ['"Lora"', 'serif'] } 
                } 
            }
        }
    </script>
    <style>
        :root { --font-size-scale: 1; }
        body { transition: background-color 0.4s ease, color 0.4s ease; }
        ::selection { background-color: #00e58f; color: #09090b; }
        
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #00e58f, #00c97d); width: 0%; z-index: 9999; transition: width 0.1s; box-shadow: 0 0 10px rgba(0,229,143,0.5); }

        /* ══════ MARKDOWN ══════ */
        .markdown-body { font-size: calc(1.125rem * var(--font-size-scale)); line-height: 1.85; font-family: "Lora", serif; word-wrap: break-word; transition: font-size 0.3s; }
        .dark .markdown-body { color: #d4d4d8; }
        .markdown-body h2, .markdown-body h3 { font-family: "Plus Jakarta Sans", sans-serif; font-weight: 800; letter-spacing: -0.02em; }
        .dark .markdown-body h2, .dark .markdown-body h3 { color: #fff; }
        .markdown-body h2 { font-size: calc(1.875rem * var(--font-size-scale)); margin: 3.5rem 0 1.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(0,229,143,0.08); }
        .markdown-body h3 { font-size: calc(1.375rem * var(--font-size-scale)); margin: 2.5rem 0 1rem; }
        .markdown-body p { margin-bottom: 1.5rem; }
        .markdown-body img { border-radius: 1.5rem; width: 100%; margin: 3rem 0; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .dark .markdown-body img { border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .markdown-body blockquote { margin: 3rem 0; padding: 1.5rem 2rem; font-size: calc(1.25rem * var(--font-size-scale)); font-style: italic; border-left: 4px solid #00e58f; background: rgba(0,229,143,0.05); border-radius: 0 15px 15px 0; }
        .markdown-body a { color: #00e58f; font-weight: 600; text-decoration: none; border-bottom: 1px dashed #00e58f; transition: all 0.2s; }
        .markdown-body a:hover { background: rgba(0,229,143,0.1); }
        .markdown-body ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .markdown-body ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .markdown-body li { margin-bottom: 0.5rem; }

        /* ══════ [MỚI] CODE BLOCKS ══════ */
        .markdown-body code { background: rgba(0,0,0,0.06); border-radius: 6px; padding: 3px 8px; font-size: 0.85em; font-family: 'Fira Code', 'Courier New', monospace; color: #00c97d; }
        .dark .markdown-body code { background: rgba(0,229,143,0.08); color: #00e58f; }
        .code-block-wrapper { position: relative; margin: 2.5rem 0; }
        .markdown-body pre { background: #0d1117; border-radius: 1rem; padding: 1.75rem; overflow-x: auto; border: 1px solid rgba(255,255,255,0.06); }
        .markdown-body pre code { background: transparent; color: #e2e8f0; padding: 0; font-size: 0.875em; line-height: 1.7; }
        .copy-code-btn {
            position: absolute; top: 0.8rem; right: 0.8rem;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; border-radius: 0.5rem; padding: 0.35rem 0.75rem;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
            cursor: pointer; font-family: "Plus Jakarta Sans", sans-serif;
            transition: all 0.25s; display: flex; align-items: center; gap: 0.4rem;
        }
        .copy-code-btn:hover { background: rgba(0,229,143,0.12); color: #00e58f; border-color: rgba(0,229,143,0.3); }
        .copy-code-btn.copied { background: rgba(0,229,143,0.15); color: #00e58f; border-color: #00e58f; }

        /* ══════ TOC ══════ */
        .toc-link { display: block; padding: 0.5rem 0 0.5rem 1rem; border-left: 2px solid rgba(0,0,0,0.05); color: #64748b; font-size: 0.85rem; transition: all 0.2s; font-family: "Plus Jakarta Sans"; }
        .dark .toc-link { border-left: 2px solid rgba(255,255,255,0.05); color: #94a3b8; }
        .toc-link:hover { color: #00e58f; }
        .toc-link.active { color: #00e58f; border-left-color: #00e58f; font-weight: 700; background: linear-gradient(90deg, rgba(0,229,143,0.05) 0%, transparent 100%); }

        /* ══════ TOAST ══════ */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); background: #0f172a; color: #fff; padding: 14px 28px; border-radius: 99px; font-weight: 600; opacity: 0; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px; }
        .dark .toast { background: #fff; color: #09090b; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        /* ══════ TAGS ══════ */
        .tag-badge { background: rgba(0,229,143,0.1); color: #00c97d; padding: 0.3rem 1rem; border-radius: 8px; font-size: 0.75rem; font-weight: 700; margin-right: 0.5rem; margin-bottom: 0.5rem; display: inline-block; font-family: "Plus Jakarta Sans"; border: 1px solid rgba(0,229,143,0.2); transition: all 0.2s; cursor: pointer; }
        .tag-badge:hover { background: rgba(0,229,143,0.2); transform: translateY(-1px); }

        /* ══════ LIKE BUTTON ══════ */
        #like-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 0.75rem 1.75rem; border-radius: 12px;
            background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05);
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
            position: relative; overflow: hidden;
        }
        .dark #like-btn { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.05); }
        #like-btn:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(239,68,68,0.3); }
        #like-btn.liked { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
        #like-btn.liked #like-icon { color: #ef4444; filter: drop-shadow(0 0 10px rgba(239,68,68,0.6)); }
        #like-btn:active { transform: scale(0.95); }
        @keyframes heartPop { 0% { transform: scale(1); } 40% { transform: scale(1.6); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
        .heart-pop { animation: heartPop 0.45s cubic-bezier(0.16,1,0.3,1); }

        /* ══════ META STAT ══════ */
        .meta-stat { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 12px; background: rgba(0,0,0,0.03); font-size: 0.85rem; font-weight: 700; border: 1px solid rgba(0,0,0,0.03); }
        .dark .meta-stat { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.05); }

        /* ══════ [MỚI] FONT SIZE CONTROLS ══════ */
        .font-ctrl-btn {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08);
            background: transparent; cursor: pointer; font-weight: 700;
            color: #64748b; font-family: "Plus Jakarta Sans", sans-serif;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .dark .font-ctrl-btn { border-color: rgba(255,255,255,0.08); color: #94a3b8; }
        .font-ctrl-btn:hover { border-color: #00e58f; color: #00e58f; background: rgba(0,229,143,0.08); }

        /* ══════ [MỚI] BACK TO TOP ══════ */
        #back-to-top {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
            width: 50px; height: 50px; border-radius: 50%;
            background: #00e58f; color: #09090b;
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 900;
            box-shadow: 0 8px 30px rgba(0,229,143,0.4);
            transform: translateY(100px) scale(0.8);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        #back-to-top.visible { transform: translateY(0) scale(1); opacity: 1; }
        #back-to-top:hover { transform: translateY(-4px) scale(1.1) !important; box-shadow: 0 14px 40px rgba(0,229,143,0.5); }
        #back-to-top:active { transform: scale(0.95) !important; }

        /* ══════ [MỚI] MOBILE TOC DRAWER ══════ */
        #toc-drawer {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
            background: #0f172a;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.5rem 1.5rem 0 0;
            padding: 1.5rem;
            max-height: 70vh; overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        .dark #toc-drawer { background: #0a0a0c; }
        #toc-drawer.open { transform: translateY(0); }
        #toc-drawer-backdrop {
            position: fixed; inset: 0; z-index: 89;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #toc-drawer-backdrop.show { opacity: 1; pointer-events: all; }

        /* ══════ [MỚI] MOBILE TOC TRIGGER ══════ */
        #toc-trigger {
            position: fixed; bottom: 2rem; left: 2rem; z-index: 88;
            padding: 0.6rem 1.2rem; border-radius: 999px;
            background: rgba(9,9,11,0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; display: none; align-items: center; gap: 0.5rem;
            transition: all 0.3s;
        }
        .dark #toc-trigger { background: rgba(9,9,11,0.95); }
        @media (max-width: 1023px) { #toc-trigger { display: flex; } }
        #toc-trigger:hover { border-color: #00e58f; color: #00e58f; }

        /* ══════ [MỚI] READING PROGRESS RING ══════ */
        #progress-ring-container {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 99;
            width: 50px; height: 50px; pointer-events: none;
        }
        #progress-ring { transform: rotate(-90deg); }
        #progress-circle { stroke-dasharray: 138; stroke-dashoffset: 138; transition: stroke-dashoffset 0.1s; }

        /* ══════ [MỚI] SHARE DROPDOWN ══════ */
        .share-dropdown {
            position: absolute; top: calc(100% + 8px); right: 0;
            background: #ffffff; border: 1px solid rgba(0,0,0,0.06);
            border-radius: 1rem; padding: 0.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            min-width: 180px; z-index: 10;
            opacity: 0; pointer-events: none; transform: translateY(-8px);
            transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
        }
        .dark .share-dropdown { background: #18181b; border-color: rgba(255,255,255,0.06); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .share-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
        .share-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.9rem; border-radius: 0.65rem; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.2s; color: #374151; }
        .dark .share-item { color: #d1d5db; }
        .share-item:hover { background: rgba(0,229,143,0.08); color: #00e58f; }
        .share-item-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }

        /* ══════ [MỚI] ESTIMATED READ PROGRESS ══════ */
        .read-progress-bar {
            position: sticky; top: 64px; z-index: 30; height: 2px;
            background: rgba(0,0,0,0.04);
        }
        .dark .read-progress-bar { background: rgba(255,255,255,0.04); }
        .read-progress-fill { height: 100%; background: linear-gradient(90deg, #00e58f, #00c97d); width: 0%; transition: width 0.1s; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-[#09090b] dark:text-[#f8fafc] antialiased flex flex-col min-h-screen">
    <div id="progress-bar"></div>

    <!-- STICKY HEADER -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-[#09090b]/80 backdrop-blur-xl border-b border-gray-200 dark:border-white/5 transition-colors duration-300">
        <div class="container mx-auto px-6 max-w-[1300px] h-16 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="index.html" class="flex items-center justify-center w-10 h-10 rounded-xl bg-gray-100 dark:bg-white/5 hover:bg-accent hover:text-black transition-all">
                    <i class="fas fa-arrow-left text-sm"></i>
                </a>
                <div id="sticky-title" class="hidden md:block text-sm font-bold text-gray-500 dark:text-gray-400 line-clamp-1 max-w-md opacity-0 transition-opacity duration-300"></div>
            </div>
            <div class="flex items-center gap-2 text-gray-500 dark:text-gray-400">
                <!-- [MỚI] Font Size Controls -->
                <div class="hidden sm:flex items-center gap-1 mr-2 border-r border-gray-200 dark:border-white/10 pr-3">
                    <button class="font-ctrl-btn text-xs" onclick="changeFontSize(-0.1)" title="Giảm cỡ chữ">A<span class="text-[8px]">–</span></button>
                    <button class="font-ctrl-btn text-sm" onclick="changeFontSize(0.1)" title="Tăng cỡ chữ">A<span class="text-[9px]">+</span></button>
                </div>

                <!-- [MỚI] Share Dropdown -->
                <div class="relative">
                    <button id="share-btn" onclick="toggleShare()" class="w-10 h-10 rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 hover:text-accent transition-colors flex items-center justify-center" title="Chia sẻ">
                        <i class="fas fa-share-nodes"></i>
                    </button>
                    <div class="share-dropdown" id="share-dropdown">
                        <div class="share-item" onclick="shareTwitter()">
                            <div class="share-item-icon bg-[#1DA1F2]/10 text-[#1DA1F2]"><i class="fab fa-twitter"></i></div>
                            Twitter / X
                        </div>
                        <div class="share-item" onclick="shareTelegram()">
                            <div class="share-item-icon bg-[#0088cc]/10 text-[#0088cc]"><i class="fab fa-telegram-plane"></i></div>
                            Telegram
                        </div>
                        <div class="share-item" onclick="shareFacebook()">
                            <div class="share-item-icon bg-[#1877F2]/10 text-[#1877F2]"><i class="fab fa-facebook-f"></i></div>
                            Facebook
                        </div>
                        <div class="share-item" onclick="copyLink()">
                            <div class="share-item-icon bg-gray-100 dark:bg-white/5 text-gray-500"><i class="fas fa-link"></i></div>
                            Sao chép link
                        </div>
                    </div>
                </div>

                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl hover:bg-gray-200 dark:hover:bg-white/10 hover:text-accent transition-colors flex items-center justify-center">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:inline text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- [MỚI] SECONDARY PROGRESS BAR (below header) -->
    <div class="read-progress-bar">
        <div class="read-progress-fill" id="read-progress-fill"></div>
    </div>

    <!-- [MỚI] BACK TO TOP -->
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Lên đầu trang">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- [MỚI] MOBILE TOC TRIGGER -->
    <button id="toc-trigger" onclick="openTocDrawer()">
        <i class="fas fa-list-ul text-accent text-xs"></i> Mục lục
    </button>

    <!-- [MỚI] MOBILE TOC DRAWER -->
    <div id="toc-drawer-backdrop" onclick="closeTocDrawer()"></div>
    <div id="toc-drawer">
        <div class="flex items-center justify-between mb-4">
            <h4 class="text-sm font-extrabold text-white flex items-center gap-2"><i class="fas fa-list-ul text-accent"></i> Mục lục nội dung</h4>
            <button onclick="closeTocDrawer()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>
        <nav id="toc-mobile" class="flex flex-col space-y-1"></nav>
    </div>

    <main class="flex-grow pt-8 pb-24">
        <article class="container mx-auto px-4 max-w-[1100px] relative">
            <!-- POST HEADER -->
            <header class="text-center mb-12 max-w-4xl mx-auto" id="post-header-section">
                <div class="mb-6 inline-block">
                    <span id="post-category" class="text-[11px] font-extrabold uppercase tracking-widest bg-accent/10 text-accent px-4 py-1.5 rounded-lg border border-accent/20 drop-shadow-sm">CATEGORY</span>
                </div>
                <h1 id="post-title" class="text-3xl md:text-5xl font-extrabold leading-[1.2] tracking-tight mb-8">Đang tải...</h1>
                <div class="flex items-center justify-center flex-wrap gap-4 text-xs font-semibold text-gray-500 dark:text-gray-400 mb-8" id="post-meta-row">
                    <div class="flex items-center gap-2">
                        <img src="https://ui-avatars.com/api/?name=Trading+Insight&background=00e58f&color=050505" class="w-8 h-8 rounded-full shadow-sm">
                        <span id="post-author" class="font-bold text-gray-800 dark:text-gray-200">Trading Insight</span>
                    </div>
                    <span class="w-1.5 h-1.5 bg-gray-300 dark:bg-white/20 rounded-full"></span>
                    <span id="post-date">Date</span>
                    <span class="w-1.5 h-1.5 bg-gray-300 dark:bg-white/20 rounded-full"></span>
                    <span id="post-read-time" class="flex items-center gap-1.5"><i class="far fa-clock text-accent/70"></i> --- phút đọc</span>
                </div>
                
                <div class="flex items-center justify-center gap-4" id="post-stats-bar">
                    <span id="post-views" class="meta-stat text-accent/90"><i class="far fa-eye text-accent text-lg"></i> ---</span>
                    <span id="post-likes-display" class="meta-stat text-red-400/90"><i class="far fa-heart text-red-400 text-lg"></i> ---</span>
                </div>
            </header>

            <!-- COVER IMAGE -->
            <div class="w-full aspect-[16/9] md:aspect-[2.5/1] rounded-[2rem] overflow-hidden mb-16 border border-gray-200 dark:border-white/5 relative hidden bg-gray-100 dark:bg-[#121214] shadow-2xl" id="img-container">
                <img id="post-image" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
            </div>

            <!-- CONTENT + SIDEBAR -->
            <div class="flex flex-col lg:flex-row gap-12 relative">
                <div class="flex-1 w-full max-w-none">
                    <div id="post-content" class="markdown-body w-full"></div>

                    <!-- POST FOOTER -->
                    <div id="post-footer" class="mt-20 pt-8 border-t border-gray-200 dark:border-white/10 space-y-6">
                        <!-- Tags -->
                        <div id="post-tags" class="flex flex-wrap gap-2"></div>

                        <!-- Actions Row -->
                        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 pt-4">
                            <button id="like-btn" onclick="handleLike()" title="Thích bài viết này">
                                <i id="like-icon" class="far fa-heart text-xl transition-colors"></i>
                                <span class="flex flex-col items-start text-left">
                                    <span class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest leading-none mb-1">Cảm ơn</span>
                                    <span id="like-count" class="leading-none text-base">0</span>
                                </span>
                            </button>

                            <!-- [MỚI] Share buttons row -->
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mr-1">Chia sẻ:</span>
                                <button onclick="shareTwitter()" class="w-9 h-9 rounded-xl bg-[#1DA1F2]/10 text-[#1DA1F2] hover:bg-[#1DA1F2]/20 transition-colors flex items-center justify-center text-sm">
                                    <i class="fab fa-twitter"></i>
                                </button>
                                <button onclick="shareTelegram()" class="w-9 h-9 rounded-xl bg-[#0088cc]/10 text-[#0088cc] hover:bg-[#0088cc]/20 transition-colors flex items-center justify-center text-sm">
                                    <i class="fab fa-telegram-plane"></i>
                                </button>
                                <button onclick="shareFacebook()" class="w-9 h-9 rounded-xl bg-[#1877F2]/10 text-[#1877F2] hover:bg-[#1877F2]/20 transition-colors flex items-center justify-center text-sm">
                                    <i class="fab fa-facebook-f"></i>
                                </button>
                                <button onclick="copyLink()" class="w-9 h-9 rounded-xl bg-gray-100 dark:bg-white/5 text-gray-500 dark:text-gray-400 hover:bg-accent/10 hover:text-accent transition-colors flex items-center justify-center text-sm">
                                    <i class="fas fa-link"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DESKTOP TOC -->
                <div class="w-full lg:w-[280px] shrink-0 hidden lg:block" id="toc-container">
                    <div class="sticky top-28">
                        <div class="border-l border-gray-200 dark:border-white/10 pl-6 mb-6">
                            <h4 class="text-[11px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-5 flex items-center gap-2"><i class="fas fa-list-ul text-accent/60"></i>Mục lục nội dung</h4>
                            <nav id="toc" class="flex flex-col space-y-2"></nav>
                        </div>

                        <!-- [MỚI] Reading Progress in Sidebar -->
                        <div class="mt-6 p-4 rounded-2xl bg-gray-50 dark:bg-white/[0.02] border border-gray-100 dark:border-white/5">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-[11px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">Tiến độ đọc</span>
                                <span id="read-pct" class="text-[11px] font-extrabold text-accent">0%</span>
                            </div>
                            <div class="h-1.5 bg-gray-200 dark:bg-white/10 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-accent to-green-400 rounded-full transition-all duration-200" id="sidebar-progress"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <!-- TOAST -->
    <div id="toast" class="toast"><i class="fas fa-check-circle text-accent text-lg"></i> Đã sao chép liên kết</div>

    <script>
        let post = null, allPosts = [];
        let fontScale = parseFloat(localStorage.getItem('fontScale') || '1');

        // ═══ THEME ═══
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');

        // ═══ [MỚI] FONT SIZE ═══
        function applyFontScale() {
            document.documentElement.style.setProperty('--font-size-scale', fontScale);
        }
        function changeFontSize(delta) {
            fontScale = Math.min(1.4, Math.max(0.8, fontScale + delta));
            localStorage.setItem('fontScale', fontScale.toFixed(1));
            applyFontScale();
        }
        applyFontScale();

        // ═══ [MỚI] SHARE DROPDOWN ═══
        function toggleShare() {
            const dd = document.getElementById('share-dropdown');
            dd.classList.toggle('open');
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#share-btn') && !e.target.closest('#share-dropdown')) {
                document.getElementById('share-dropdown').classList.remove('open');
            }
        });

        // ═══ [MỚI] BACK TO TOP ═══
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('back-to-top');
            if (window.scrollY > 500) btn.classList.add('visible');
            else btn.classList.remove('visible');
        });

        // ═══ [MỚI] MOBILE TOC DRAWER ═══
        function openTocDrawer() {
            document.getElementById('toc-drawer').classList.add('open');
            document.getElementById('toc-drawer-backdrop').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        function closeTocDrawer() {
            document.getElementById('toc-drawer').classList.remove('open');
            document.getElementById('toc-drawer-backdrop').classList.remove('show');
            document.body.style.overflow = '';
        }

        const formatDate = d => d ? new Date(d).toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Mới đây';
        const getImg = img => img && img.trim() ? img : 'https://images.unsplash.com/photo-1639762681485-074b7f4fc8fd?q=80&w=1200';

        function getMetrics(id) {
            const numId = Number(id) || 1;
            const storageKey = `metrics_post_${numId}`;
            const now = Date.now();
            let metricsData = localStorage.getItem(storageKey);
            let metrics;
            if (!metricsData) {
                const seed = (numId * 997) % 10000;
                metrics = { views: 1200 + seed + (numId % 500), likes: 120 + Math.floor(seed / 10), lastUpdated: now };
            } else {
                metrics = JSON.parse(metricsData);
                const hoursPassed = (now - metrics.lastUpdated) / (1000 * 60 * 60);
                if (hoursPassed >= 1) {
                    metrics.views += Math.floor(hoursPassed * (Math.random() * 8 + 3));
                    metrics.likes += Math.floor(hoursPassed * (Math.random() * 2));
                    metrics.lastUpdated = now;
                }
            }
            localStorage.setItem(storageKey, JSON.stringify(metrics));
            return {
                viewsFormatted: metrics.views.toLocaleString('vi-VN'),
                likesFormatted: metrics.likes.toLocaleString('vi-VN'),
                rawViews: metrics.views,
                rawLikes: metrics.likes
            };
        }

        function trackPostVisit(postTitle, postSlug, postId) {
            try {
                const visits = JSON.parse(localStorage.getItem('site_visits') || '[]');
                visits.push({ page: 'post', title: postTitle, slug: postSlug, ts: Date.now() });
                if (visits.length > 2000) visits.splice(0, visits.length - 2000);
                localStorage.setItem('site_visits', JSON.stringify(visits));
                if (!sessionStorage.getItem('viewed_' + postId)) {
                    sessionStorage.setItem('viewed_' + postId, '1');
                    const storageKey = `metrics_post_${postId}`;
                    let metricsObj = JSON.parse(localStorage.getItem(storageKey));
                    if(metricsObj) { metricsObj.views += 1; localStorage.setItem(storageKey, JSON.stringify(metricsObj)); }
                }
            } catch(e) {}
        }

        async function loadPost() {
            const slug = new URLSearchParams(location.search).get('slug');
            try {
                const res = await fetch('./data/posts.json?v=' + new Date().getTime(), { cache: 'no-store' });
                if (res.ok) {
                    const serverPosts = await res.json();
                    let localPosts = JSON.parse(localStorage.getItem('crypto_posts') || '[]');
                    const serverIds = new Set(serverPosts.map(p => String(p.id)));
                    const localOnlyPosts = localPosts.filter(p => p.status !== 'published' && !serverIds.has(String(p.id)));
                    allPosts = [...serverPosts, ...localOnlyPosts];
                    localStorage.setItem('crypto_posts', JSON.stringify(allPosts));
                }
            } catch(e) {
                try { allPosts = JSON.parse(localStorage.getItem('crypto_posts') || '[]'); } catch(err) {}
            }

            try {
                post = allPosts.find(p => p.slug === slug);
                if (!post) throw new Error("Not found");
            } catch(e) {
                document.getElementById('post-header-section').style.display = 'none';
                document.getElementById('img-container').classList.add('hidden');
                document.getElementById('post-content').innerHTML = `
                    <div class="text-center py-32">
                        <div class="text-8xl mb-8">👻</div>
                        <p class="text-red-500 font-extrabold text-3xl tracking-tight mb-3">404 — Rất tiếc!</p>
                        <p class="text-gray-500 font-serif mb-10">Bài viết này không tồn tại hoặc đã bị xóa khỏi hệ thống.</p>
                        <a href="index.html" class="inline-block px-8 py-3.5 bg-accent text-black font-bold rounded-xl transition-all hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(0,229,143,0.3)]">← Quay về trang chủ</a>
                    </div>`;
                document.getElementById('toc-trigger').style.display = 'none';
                return;
            }

            let metrics = getMetrics(post.id);
            trackPostVisit(post.title, post.slug, post.id);
            metrics = getMetrics(post.id);

            document.title = `${post.title} - Trading Insight`;
            document.getElementById('sticky-title').innerText = post.title;
            document.getElementById('post-category').innerText = post.category || 'ARTICLE';
            document.getElementById('post-title').innerText = post.title;
            document.getElementById('post-author').innerText = post.author || 'Trading Insight';
            document.getElementById('post-date').innerText = formatDate(post.date);

            const wordCount = (post.content || '').trim().split(/\s+/).length;
            const readMin = Math.max(1, Math.ceil(wordCount / 250));
            document.getElementById('post-read-time').innerHTML = `<i class="far fa-clock text-accent/70"></i> ${readMin} phút đọc`;

            document.getElementById('post-views').innerHTML = `<i class="far fa-eye text-accent text-lg"></i> ${metrics.viewsFormatted}`;
            document.getElementById('post-likes-display').innerHTML = `<i class="far fa-heart text-red-400 text-lg"></i> ${metrics.likesFormatted}`;

            if (post.image) {
                document.getElementById('post-image').src = post.image;
                document.getElementById('img-container').classList.remove('hidden');
            }

            marked.setOptions({ breaks: true, gfm: true });
            document.getElementById('post-content').innerHTML = marked.parse(post.content || '');

            // [MỚI] Add copy buttons to code blocks
            addCopyButtons();

            if (post.tags && post.tags.length) {
                document.getElementById('post-tags').innerHTML = post.tags.map(tag => `<span class="tag-badge">#${escapeHtml(tag.trim())}</span>`).join('');
            }

            generateTOC();
            loadLikes(metrics.rawLikes);
            renderRelated();
        }

        // ═══ [MỚI] COPY CODE BUTTONS ═══
        function addCopyButtons() {
            const preBlocks = document.querySelectorAll('.markdown-body pre');
            preBlocks.forEach(pre => {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const btn = document.createElement('button');
                btn.className = 'copy-code-btn';
                btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                btn.onclick = () => {
                    const code = pre.querySelector('code')?.innerText || pre.innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        btn.innerHTML = '<i class="fas fa-check"></i> Đã copy!';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                };
                wrapper.appendChild(btn);
            });
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        // ═══ LIKE ═══
        let currentLikeTotal = 0;

        function loadLikes(rawLikes) {
            currentLikeTotal = rawLikes;
            const liked = localStorage.getItem(`liked_${post.id}`);
            const likeBtn = document.getElementById('like-btn');
            const likeIcon = document.getElementById('like-icon');
            document.getElementById('like-count').innerText = currentLikeTotal.toLocaleString('vi-VN');
            if (liked) {
                likeBtn.classList.add('liked');
                likeIcon.className = 'fas fa-heart text-xl text-red-500';
            }
        }

        function handleLike() {
            if (localStorage.getItem(`liked_${post.id}`)) return;
            localStorage.setItem(`liked_${post.id}`, '1');
            const storageKey = `metrics_post_${post.id}`;
            let metricsObj = JSON.parse(localStorage.getItem(storageKey));
            if(metricsObj) {
                metricsObj.likes += 1;
                localStorage.setItem(storageKey, JSON.stringify(metricsObj));
                currentLikeTotal = metricsObj.likes;
            } else { currentLikeTotal += 1; }

            const likeBtn = document.getElementById('like-btn');
            const likeCountSpan = document.getElementById('like-count');
            const likeIcon = document.getElementById('like-icon');
            likeIcon.className = 'fas fa-heart text-xl heart-pop text-red-500';
            likeBtn.classList.add('liked');
            likeCountSpan.innerText = currentLikeTotal.toLocaleString('vi-VN');
            document.getElementById('post-likes-display').innerHTML = `<i class="fas fa-heart text-red-400 text-lg"></i> ${currentLikeTotal.toLocaleString('vi-VN')}`;
            createHeartBurst();
        }

        function createHeartBurst() {
            const btn = document.getElementById('like-btn');
            const rect = btn.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.cssText = `position: fixed; left: ${rect.left + rect.width/2}px; top: ${rect.top + 10}px; font-size: ${12 + Math.random() * 16}px; pointer-events: none; z-index: 9999; animation: floatHeart 1s ease-out forwards; transform: translateX(${(Math.random() - 0.5) * 100}px);`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }

        const style = document.createElement('style');
        style.textContent = `@keyframes floatHeart { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.5); } }`;
        document.head.appendChild(style);

        // ═══ RELATED POSTS ═══
        function renderRelated() {
            const related = allPosts.filter(p =>
                p.slug !== post.slug && p.status === 'published' &&
                (p.category === post.category || (p.tags && post.tags && p.tags.some(t => post.tags.includes(t))))
            ).slice(0, 3);
            if (related.length === 0) return;
            const container = document.createElement('div');
            container.className = 'mt-16 pt-10 border-t border-gray-200 dark:border-white/10';
            container.innerHTML = `
                <h3 class="text-xl font-extrabold mb-8 flex items-center gap-3"><i class="fas fa-layer-group text-accent"></i> Bài Viết Đề Xuất</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${related.map(p => {
                        const m = getMetrics(p.id);
                        const rt = Math.max(1, Math.ceil((p.content||'').trim().split(/\s+/).length / 250));
                        return `
                        <a href="post.html?slug=${p.slug}" class="group block bg-gray-50 dark:bg-white/[0.02] p-3 rounded-2xl border border-transparent hover:border-gray-200 dark:hover:border-white/10 transition-all hover:-translate-y-1">
                            <div class="aspect-video rounded-xl overflow-hidden mb-4 relative shadow-sm">
                                <img src="${getImg(p.image)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                <div class="absolute top-2 right-2 bg-black/60 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur-sm">${rt}p đọc</div>
                            </div>
                            <span class="text-[10px] font-bold text-accent uppercase tracking-wider mb-1 block">${p.category || 'TIN TỨC'}</span>
                            <h4 class="font-bold text-sm group-hover:text-accent transition-colors line-clamp-2 mb-3 leading-snug">${p.title}</h4>
                            <div class="flex gap-4 text-xs text-gray-500 dark:text-gray-400 font-semibold">
                                <span><i class="far fa-eye mr-1.5 text-accent/80"></i>${m.viewsFormatted}</span>
                                <span><i class="far fa-heart mr-1.5 text-red-400/80"></i>${m.likesFormatted}</span>
                            </div>
                        </a>`;
                    }).join('')}
                </div>`;
            document.querySelector('.flex-1.w-full').appendChild(container);
        }

        // ═══ [MỚI] TABLE OF CONTENTS (desktop + mobile) ═══
        function generateTOC() {
            const headings = document.querySelectorAll('.markdown-body h2, .markdown-body h3');
            const toc = document.getElementById('toc');
            const tocMobile = document.getElementById('toc-mobile');
            if (headings.length === 0) {
                toc.innerHTML = '<span class="text-xs text-gray-400 dark:text-gray-600 italic">Không có mục lục</span>';
                document.getElementById('toc-trigger').style.display = 'none';
                return;
            }
            headings.forEach((h, i) => {
                const id = `heading-${i}`;
                h.id = id;
                // Desktop
                const link = document.createElement('a');
                link.href = `#${id}`;
                link.innerText = h.innerText;
                link.className = `toc-link ${h.tagName === 'H3' ? 'ml-3 text-[12px] opacity-80' : ''}`;
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({ top: h.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
                });
                toc.appendChild(link);

                // Mobile
                const mLink = link.cloneNode(true);
                mLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    closeTocDrawer();
                    setTimeout(() => window.scrollTo({ top: h.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }), 350);
                });
                tocMobile.appendChild(mLink);
            });

            window.addEventListener('scroll', () => {
                let current = '';
                headings.forEach(h => { if (window.scrollY >= h.offsetTop - 140) current = h.id; });
                document.querySelectorAll('.toc-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${current}`) link.classList.add('active');
                });
            });
        }

        // ═══ SCROLL PROGRESS ═══
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pct = Math.round(winScroll / height * 100);
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('read-progress-fill').style.width = pct + '%';
            
            const sidebarProgress = document.getElementById('sidebar-progress');
            const readPct = document.getElementById('read-pct');
            if (sidebarProgress) sidebarProgress.style.width = pct + '%';
            if (readPct) readPct.textContent = pct + '%';

            const stickyTitle = document.getElementById('sticky-title');
            if (winScroll > 450) stickyTitle.classList.remove('opacity-0');
            else stickyTitle.classList.add('opacity-0');
        });

        // ═══ [MỚI] SHARE FUNCTIONS ═══
        function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(location.href)}`); }
        function shareTelegram() { window.open(`https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(post.title)}`); }
        function shareFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`); }
        function copyLink() { navigator.clipboard.writeText(location.href); showToast(); document.getElementById('share-dropdown').classList.remove('open'); }
        function showToast() { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

        loadPost();
    </script>
</body>
</html>
