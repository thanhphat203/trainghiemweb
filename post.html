<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%2300e58f' d='M211.5 5.5c24.5-7.3 50.5-7.3 75 0l160 48c22.4 6.7 37.5 27.6 37.5 50.5s-15.1 43.8-37.5 50.5l-160 48c-24.5 7.3-50.5 7.3-75 0l-160-48C29.1 147.8 14 126.9 14 104s15.1-43.8 37.5-50.5l160-48zM14 266.3l48.4-14.5c21.8 19 50 31.8 81 37.8L59.2 314.8C36.8 321.5 21.7 342.4 21.7 365.3s15.1 43.8 37.5 50.5l160 48c24.5 7.3 50.5 7.3 75 0l160-48c22.4-6.7 37.5-27.6 37.5-50.5s-15.1-43.8-37.5-50.5l-84.2-25.2c31-6 59.2-18.8 81-37.8l48.4 14.5c22.4 6.7 37.5 27.6 37.5 50.5s-15.1 43.8-37.5 50.5l-160 48c-24.5 7.3-50.5 7.3-75 0l-160-48C29.1 395.8 14 374.9 14 352s15.1-43.8 37.5-50.5z'/%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Article - Trading Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { accent: '#00e58f' },
                    fontFamily: { sans: ['"Inter"', 'sans-serif'], serif: ['"Lora"', 'serif'], }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #00e58f, #00c97d); width: 0%; z-index: 9999; }
        
        .markdown-body { font-size: 1.125rem; line-height: 1.85; font-family: "Lora", serif; word-wrap: break-word;}
        .dark .markdown-body { color: #d4d4d8; }
        .markdown-body h2, .markdown-body h3 { font-family: "Inter", sans-serif; font-weight: 800; }
        .dark .markdown-body h2, .dark .markdown-body h3 { color: #fff; }
        .markdown-body h2 { font-size: 1.875rem; margin: 3.5rem 0 1.5rem; }
        .markdown-body h3 { font-size: 1.375rem; margin: 2.5rem 0 1rem; }
        .markdown-body p { margin-bottom: 1.5rem; }
        .markdown-body img { border-radius: 1rem; width: 100%; margin: 3rem 0; border: 1px solid rgba(0,0,0,0.1); }
        .dark .markdown-body img { border: 1px solid rgba(255,255,255,0.05); }
        .markdown-body blockquote { margin: 3rem 0; padding: 1.5rem 2rem; font-size: 1.25rem; font-style: italic; border-left: 4px solid #00e58f; background: rgba(0,229,143,0.05); border-radius: 0 10px 10px 0;}
        
        .toc-link { display: block; padding: 0.4rem 0 0.4rem 1rem; border-left: 2px solid rgba(0,0,0,0.1); color: #6b7280; font-size: 0.85rem; transition: all 0.2s; font-family: "Inter"; }
        .dark .toc-link { border-left: 2px solid rgba(255,255,255,0.1); color: #8b8b93;}
        .toc-link.active { color: #00e58f; border-left-color: #00e58f; font-weight: 600; }
        .dark .toc-link.active { color: #00e58f; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); background: #111827; color: #fff; padding: 12px 24px; border-radius: 99px; font-weight: 600; opacity: 0; transition: all 0.4s; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
        .dark .toast { background: #fff; color: #050505; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }
        .tag-badge { background: rgba(0,229,143,0.1); color:#00c97d; padding: 0.3rem 0.8rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; margin-right: 0.5rem; margin-bottom: 0.5rem; display: inline-block; font-family: "Inter";}
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-[#050505] dark:text-[#f8fafc] antialiased flex flex-col min-h-screen">
    <div id="progress-bar"></div>
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-[#050505]/80 backdrop-blur-xl border-b border-gray-200 dark:border-white/5 transition-colors duration-300">
        <div class="container mx-auto px-6 max-w-[1300px] h-14 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="index.html" class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 transition-colors"><i class="fas fa-arrow-left text-xs"></i></a>
                <div id="sticky-title" class="hidden md:block text-xs font-semibold text-gray-500 dark:text-gray-400 line-clamp-1 max-w-md opacity-0 transition-opacity duration-300"></div>
            </div>
            <div class="flex items-center gap-5 text-gray-500 dark:text-gray-400">
                <button onclick="shareTwitter()" class="hover:text-[#1DA1F2] transition-colors"><i class="fab fa-twitter"></i></button>
                <button onclick="copyLink()" class="hover:text-black dark:hover:text-white transition-colors"><i class="fas fa-link"></i></button>
                <button onclick="toggleTheme()" class="hover:text-accent transition-colors"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline text-yellow-400"></i></button>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-16 pb-24">
        <article class="container mx-auto px-4 max-w-[1100px] relative">
            <header class="text-center mb-12 max-w-3xl mx-auto" id="post-header-section">
                <div class="mb-6 inline-block"><span id="post-category" class="text-[10px] font-bold uppercase tracking-widest bg-accent/10 text-accent px-3 py-1 rounded-full border border-accent/20">CATEGORY</span></div>
                <h1 id="post-title" class="text-3xl md:text-5xl font-extrabold leading-[1.2] tracking-tight mb-8">Đang tải...</h1>
                <div class="flex items-center justify-center gap-4 text-xs font-medium text-gray-500 dark:text-gray-400" id="post-meta-row">
                    <div class="flex items-center gap-2">
                        <img src="https://ui-avatars.com/api/?name=Trading+Insight&background=00e58f&color=050505" class="w-7 h-7 rounded-full shadow-sm">
                        <span id="post-author" class="font-bold text-gray-800 dark:text-gray-200">Trading Insight Team</span>
                    </div>
                    <span class="w-1 h-1 bg-gray-300 dark:bg-white/20 rounded-full"></span>
                    <span id="post-date">Date</span>
                    <span class="w-1 h-1 bg-gray-300 dark:bg-white/20 rounded-full"></span>
                    <span id="post-views" class="flex items-center gap-1"><i class="far fa-eye"></i> ---</span>
                </div>
            </header>

            <div class="w-full aspect-[16/9] md:aspect-[2.5/1] rounded-3xl overflow-hidden mb-16 border border-gray-200 dark:border-white/5 relative hidden bg-gray-100 dark:bg-[#0f0f11] shadow-xl" id="img-container">
                <img id="post-image" src="" class="w-full h-full object-cover">
            </div>

            <div class="flex flex-col lg:flex-row gap-12 relative">
                
                <div class="flex-1 w-full max-w-none">
                    <div id="post-content" class="markdown-body w-full"></div>
                    
                    <div id="post-footer" class="mt-16 pt-8 border-t border-gray-200 dark:border-white/10 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div id="post-tags" class="flex flex-wrap gap-2 justify-center md:justify-start"></div>
                        
                        <button id="like-btn" class="flex items-center gap-2 text-sm bg-gray-100 dark:bg-white/5 px-6 py-3 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 font-bold transition-all hover:scale-105 active:scale-95 shadow-sm cursor-pointer">
                            <i id="like-icon" class="far fa-heart"></i> Lượt Thích: <span id="like-count">0</span>
                        </button>
                    </div>
                </div>

                <div class="w-full lg:w-[280px] shrink-0 hidden lg:block" id="toc-container">
                    <div class="sticky top-28 border-l border-gray-200 dark:border-white/10 pl-5">
                        <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Mục lục nội dung</h4>
                        <nav id="toc" class="flex flex-col space-y-1.5"></nav>
                    </div>
                </div>

            </div>
        </article>
    </main>

    <div id="toast" class="toast"><i class="fas fa-check-circle text-accent mr-2"></i> Đã sao chép liên kết</div>

    <script>
        let post = null, allPosts = [];

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');

        const formatDate = d => d ? new Date(d).toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Mới đây';
        const getImg = img => img && img.trim() ? img : 'https://images.unsplash.com/photo-1639762681485-074b7f4fc8fd?q=80&w=1200';
        
        const getMetrics = (id) => {
            const numId = Number(id) || Date.now();
            const seed = (numId % 10000) + 1234;
            
            let extraViews = parseInt(localStorage.getItem(`views_extra_${id}`)) || 0;
            let extraLikes = parseInt(localStorage.getItem(`likes_extra_${id}`)) || 0;
            
            let baseViews = ((seed * 7) % 8000 + 1500) + extraViews;
            let baseLikes = ((seed * 3) % 500 + 150) + extraLikes;

            return { views: baseViews.toLocaleString('vi-VN'), baseLikes: baseLikes, rawViews: baseViews };
        };

        async function loadPost() {
            const slug = new URLSearchParams(location.search).get('slug');
            try {
                // ƯU TIÊN 1: Gọi API lên GitHub lấy data mới nhất, gắn đuôi thời gian chống cache file JSON
                const res = await fetch('./data/posts.json?v=' + new Date().getTime(), { cache: 'no-store' });
                if(res.ok) {
                    const serverPosts = await res.json();
                    
                    let localPosts = [];
                    try { localPosts = JSON.parse(localStorage.getItem('crypto_posts') || '[]'); } catch(e){}
                    if (!Array.isArray(localPosts)) localPosts = [];
                    
                    const serverIds = new Set(serverPosts.map(p => String(p.id)));
                    // LỌC RÁC: dọn các bài đã xóa trên Server
                    const localOnlyPosts = localPosts.filter(p => p.status !== 'published' && !serverIds.has(String(p.id)));
                    allPosts = [...serverPosts, ...localOnlyPosts];
                    
                    localStorage.setItem('crypto_posts', JSON.stringify(allPosts));
                } else throw new Error("Server error");
            } catch(e) { 
                // MẤT MẠNG HOẶC GITHUB SẬP: Mới lôi bài lưu tạm ra cho user đọc offline
                let local = localStorage.getItem('crypto_posts');
                if(local) { try { allPosts = JSON.parse(local); } catch(err) { allPosts = []; } }
            }

            try {
                post = allPosts.find(p => p.slug === slug);
                if(!post) throw new Error("Bài viết không tồn tại");
            } catch(e) {
                // XỬ LÝ KHI BÀI VIẾT BỊ XÓA HOẶC LINK SAI
                document.getElementById('post-category').style.display = 'none';
                document.getElementById('post-title').innerText = "Bài viết không tồn tại";
                document.getElementById('post-meta-row').style.display = 'none'; 
                document.getElementById('post-footer').style.display = 'none'; 
                document.getElementById('toc-container').style.display = 'none'; 
                document.getElementById('img-container').classList.add('hidden');
                
                document.getElementById('post-content').innerHTML = `
                    <div class="text-center py-20 fade-in">
                        <i class="fas fa-ghost text-6xl text-gray-300 dark:text-gray-700 mb-6 drop-shadow-md"></i>
                        <p class="text-red-500 font-black text-2xl tracking-tight mb-2">Rất tiếc!</p>
                        <p class="text-gray-500 font-serif mb-8">Bài viết này không tồn tại hoặc đã bị Admin xóa khỏi hệ thống.</p>
                        <a href="index.html" class="inline-block px-8 py-3 bg-textMain dark:bg-white text-white dark:text-black hover:bg-accent dark:hover:bg-accent hover:text-white dark:hover:text-white font-bold rounded-full transition-all hover:scale-105 active:scale-95 shadow-lg">Quay về trang chủ</a>
                    </div>`;
                return;
            }

            // Tăng View ảo khi vào bài
            let currentViews = parseInt(localStorage.getItem(`views_extra_${post.id}`)) || 0;
            localStorage.setItem(`views_extra_${post.id}`, currentViews + 1);

            const metrics = getMetrics(post.id);

            document.title = `${post.title} - Trading Insight`;
            document.getElementById('sticky-title').innerText = post.title;
            document.getElementById('post-category').innerText = post.category || 'ARTICLE';
            document.getElementById('post-title').innerText = post.title;
            document.getElementById('post-author').innerText = post.author || 'Trading Insight';
            document.getElementById('post-date').innerText = formatDate(post.date);
            document.getElementById('post-views').innerHTML = `<i class="far fa-eye"></i> ${metrics.views}`;
            
            if(post.image) {
                document.getElementById('post-image').src = post.image;
                document.getElementById('img-container').classList.remove('hidden');
            }
            marked.setOptions({ breaks: true, gfm: true });
            document.getElementById('post-content').innerHTML = marked.parse(post.content || '');
            
            if(post.content && post.content.includes('twitter-tweet')) {
                const script = document.createElement('script');
                script.src = "https://platform.twitter.com/widgets.js";
                script.async = true; script.charset = "utf-8";
                document.body.appendChild(script);
            }

            if(post.tags && post.tags.length) {
                document.getElementById('post-tags').innerHTML = post.tags.map(tag => `<span class="tag-badge">#${escapeHtml(tag.trim())}</span>`).join('');
            }

            generateTOC();
            loadLikes(metrics.baseLikes);
            renderRelated();
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        function loadLikes(totalLikesCalculated) {
            let liked = localStorage.getItem(`liked_${post.id}`);
            let totalLikes = totalLikesCalculated;
            
            const likeBtn = document.getElementById('like-btn');
            const likeCountSpan = document.getElementById('like-count');
            const likeIcon = document.getElementById('like-icon');
            
            const updateUI = () => {
                likeCountSpan.innerText = totalLikes.toLocaleString('vi-VN');
                if(liked) {
                    likeIcon.className = "fas fa-heart text-accent drop-shadow-[0_0_8px_rgba(0,229,143,0.8)]";
                    likeBtn.classList.add('ring-2', 'ring-accent', 'ring-offset-2', 'dark:ring-offset-[#050505]');
                }
            };
            
            updateUI(); 
            
            likeBtn.onclick = () => {
                if(!localStorage.getItem(`liked_${post.id}`)) {
                    let currentExtra = parseInt(localStorage.getItem(`likes_extra_${post.id}`)) || 0;
                    localStorage.setItem(`likes_extra_${post.id}`, currentExtra + 1);
                    localStorage.setItem(`liked_${post.id}`, '1');
                    
                    totalLikes += 1;
                    liked = true;
                    updateUI(); 
                }
            };
        }

        function renderRelated() {
            const related = allPosts.filter(p => p.slug !== post.slug && p.status === 'published' && (p.category === post.category || (p.tags && post.tags && p.tags.some(t => post.tags.includes(t))))).slice(0,3);
            if(related.length === 0) return;
            
            const container = document.createElement('div');
            container.className = 'mt-12 pt-8 border-t border-gray-200 dark:border-white/10';
            container.innerHTML = `
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2"><i class="fas fa-layer-group text-accent"></i> Bài viết liên quan</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${related.map(p => `
                        <a href="post.html?slug=${p.slug}" class="group block">
                            <div class="aspect-video rounded-xl overflow-hidden mb-3 border border-gray-200 dark:border-white/10">
                                <img src="${getImg(p.image)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            </div>
                            <h4 class="font-bold text-sm group-hover:text-accent transition-colors line-clamp-2">${p.title}</h4>
                        </a>
                    `).join('')}
                </div>
            `;
            document.querySelector('.flex-1.w-full').appendChild(container);
        }

        function generateTOC() {
            const headings = document.querySelectorAll('.markdown-body h2, .markdown-body h3');
            const toc = document.getElementById('toc');
            if(headings.length === 0) { toc.innerHTML = '<span class="text-xs text-gray-400 italic">Không có mục lục</span>'; return; }
            headings.forEach((h, i) => {
                const id = `heading-${i}`;
                h.id = id;
                const link = document.createElement('a');
                link.href = `#${id}`;
                link.innerText = h.innerText;
                link.className = `toc-link ${h.tagName === 'H3' ? 'ml-3 text-[12px]' : ''}`;
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({ top: h.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
                });
                toc.appendChild(link);
            });
            window.addEventListener('scroll', () => {
                let current = '';
                headings.forEach(h => { if(window.scrollY >= h.offsetTop - 120) current = h.id; });
                document.querySelectorAll('.toc-link').forEach(link => {
                    link.classList.remove('active');
                    if(link.getAttribute('href') === `#${current}`) link.classList.add('active');
                });
            });
        }

        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById('progress-bar').style.width = (winScroll / height) * 100 + '%';
            const stickyTitle = document.getElementById('sticky-title');
            if(winScroll > 400) stickyTitle.classList.remove('opacity-0'); else stickyTitle.classList.add('opacity-0');
        });

        function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(location.href)}`); }
        function copyLink() { navigator.clipboard.writeText(location.href); showToast(); }
        function showToast() { const toast = document.getElementById('toast'); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }

        loadPost();
    </script>
</body>
</html>
