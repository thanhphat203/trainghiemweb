    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Article - Trading Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { accent: '#00e58f' },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], serif: ['"Lora"', 'serif'] }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.4s ease, color 0.4s ease; overflow-x: hidden; }
        ::selection { background-color: #00e58f; color: #09090b; }

        /* ═══ READING PROGRESS ═══ */
        #progress-bar {
            position: fixed; top: 0; left: 0; height: 3.5px;
            background: linear-gradient(90deg, #00e58f, #00f5a0);
            width: 0%; z-index: 9999; transition: width 0.08s linear;
            box-shadow: 0 0 15px rgba(0,229,143,1), 0 0 5px rgba(0,229,143,0.8);
        }

        /* ═══ UNIVERSE CANVAS ═══ */
        #star-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none;
            opacity: 0; transition: opacity 1.2s ease;
        }
        html.dark #star-canvas { opacity: 1; }

        /* ═══ NEBULA GLOWS ═══ */
        .nebula { position: fixed; border-radius: 50%; filter: blur(120px); z-index: 1; pointer-events: none; opacity: 0; transition: opacity 1.5s ease; }
        html.dark .nebula { opacity: 1; }
        .nebula-1 { top: -15%; left: -10%; width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(0,229,143,0.05) 0%, transparent 70%); animation: nebulaFloat 30s ease-in-out infinite; }
        .nebula-2 { bottom: -25%; right: -15%; width: 65vw; height: 65vw; background: radial-gradient(circle, rgba(40,70,200,0.06) 0%, transparent 70%); animation: nebulaFloat 38s ease-in-out infinite reverse; }
        .nebula-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(180,50,255,0.03) 0%, transparent 70%); animation: nebulaFloat 25s ease-in-out infinite; animation-delay: -10s; }
        @keyframes nebulaFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(3vw,-5vh) scale(1.06); }
            66% { transform: translate(-3vw,4vh) scale(0.95); }
        }

        /* ═══ MOON SCENE ═══ */
        #moon-scene {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 105px;
            z-index: 25; pointer-events: none;
            opacity: 0; transition: opacity 1.2s ease;
        }
        html.dark #moon-scene { opacity: 1; }
        .moon-ground {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70px;
            background: linear-gradient(180deg, #0a1020 0%, #141c2e 100%);
            border-top: 1px solid rgba(100,130,200,0.12);
        }
        .moon-crater {
            position: absolute; border-radius: 50%;
            background: rgba(0,0,0,0.28);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03);
        }
        .moon-ground::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(150,180,255,0.15) 30%, rgba(150,200,255,0.08) 60%, transparent 100%);
        }

        /* ═══ ASTRONAUT DRAG & DROP ĐÃ FIX LỖI NỀN XÁM ═══ */
        .moon-astronaut {
            position: absolute;
            width: 85px; height: 85px;
            margin-left: -42.5px;
            margin-bottom: -42.5px;
            cursor: grab;
            display: flex; justify-content: center; align-items: center;
            z-index: 30;
            will-change: left, bottom, transform;
            transition: transform 0.2s cubic-bezier(0.16,1,0.3,1);
            pointer-events: auto; 
        }
        .moon-astronaut:active { cursor: grabbing; transform: scale(1.1); }
        .moon-astronaut img {
            width: 140%; height: 140%;
            object-fit: contain;
            pointer-events: none; 
            user-select: none;
            -webkit-user-drag: none;
            /* Thêm bóng đổ mờ mờ cho xịn */
            filter: drop-shadow(0 0 10px rgba(0,229,143,0.3)); 
        }

        @keyframes dustPuff { 0%{opacity:0.6;transform:scale(0.3)} 100%{opacity:0;transform:scale(2) translateY(-10px)} }
        .dust-puff { position:absolute; bottom:0; width:30px; height:12px; border-radius:50%; background:rgba(100,120,180,0.15); pointer-events:none; animation:dustPuff 0.8s ease-out forwards; }

        /* ═══ HEADER NAVBAR ═══ */
        .post-nav {
            background: rgba(9,9,11,0.7);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        .light-nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        /* ═══ ARTICLE HEADER ═══ */
        .category-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0,229,143,0.1); color: #00e58f;
            padding: 6px 18px; border-radius: 8px; font-size: 11px;
            font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
            border: 1px solid rgba(0,229,143,0.25);
            box-shadow: 0 0 20px rgba(0,229,143,0.08), inset 0 1px 0 rgba(0,229,143,0.1);
            font-family: "Plus Jakarta Sans", sans-serif;
        }

        /* ═══ MARKDOWN BODY ═══ */
        .markdown-body { font-size: 1.115rem; line-height: 1.88; font-family: "Lora", serif; word-wrap: break-word; position: relative; z-index: 10; }
        .dark .markdown-body { color: #cbd5e1; }
        .markdown-body h2, .markdown-body h3 { font-family: "Plus Jakarta Sans", sans-serif; font-weight: 800; letter-spacing: -0.025em; }
        .dark .markdown-body h2, .dark .markdown-body h3 { color: #f1f5f9; }
        .markdown-body h2 { font-size: 1.875rem; margin: 3.5rem 0 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .markdown-body h3 { font-size: 1.35rem; margin: 2.5rem 0 1rem; }
        .markdown-body p { margin-bottom: 1.6rem; }
        .markdown-body img { border-radius: 1.5rem; width: 100%; margin: 3rem 0; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.06); }
        .markdown-body blockquote {
            margin: 3rem 0; padding: 1.5rem 2rem 1.5rem 1.75rem;
            font-size: 1.2rem; font-style: italic;
            border-left: 4px solid #00e58f;
            background: linear-gradient(90deg, rgba(0,229,143,0.07) 0%, transparent 100%);
            border-radius: 0 16px 16px 0;
            box-shadow: inset 0 0 40px rgba(0,229,143,0.02);
        }
        .dark .markdown-body blockquote { color: #94a3b8; }
        .markdown-body a { color: #00e58f; font-weight: 600; text-decoration: none; border-bottom: 1px dashed rgba(0,229,143,0.5); transition: all 0.2s; }
        .markdown-body a:hover { background: rgba(0,229,143,0.08); border-bottom-style: solid; }
        .markdown-body code { background: rgba(255,255,255,0.06); border-radius: 6px; padding: 3px 8px; font-size: 0.83em; font-family: monospace; border: 1px solid rgba(255,255,255,0.06); color: #00c97d; }
        .markdown-body ul { list-style: none; padding-left: 0; margin-bottom: 1.5rem; }
        .markdown-body ul li::before { content: '→'; color: #00e58f; margin-right: 10px; font-weight: 700; }
        .markdown-body ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .markdown-body li { margin-bottom: 0.6rem; }

        /* ═══ TOC ═══ */
        .toc-link {
            display: block; padding: 0.45rem 0 0.45rem 1rem;
            border-left: 2px solid rgba(255,255,255,0.05);
            color: #64748b; font-size: 0.83rem;
            transition: all 0.25s; font-family: "Plus Jakarta Sans";
        }
        .dark .toc-link { color: #4b5563; }
        .toc-link:hover { color: #00e58f; border-left-color: rgba(0,229,143,0.3); padding-left: 1.3rem; }
        .toc-link.active {
            color: #00e58f; border-left-color: #00e58f; font-weight: 700;
            background: linear-gradient(90deg, rgba(0,229,143,0.07) 0%, transparent 100%);
            padding-left: 1.3rem;
        }

        /* ═══ META STATS ═══ */
        .meta-stat {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 8px 18px; border-radius: 30px;
            background: rgba(255,255,255,0.03); font-size: 0.88rem;
            font-weight: 700; border: 1px solid rgba(255,255,255,0.06);
            font-family: "Plus Jakarta Sans";
            transition: all 0.3s;
        }
        .meta-stat:hover { background: rgba(255,255,255,0.06); transform: translateY(-1px); }

        /* ═══ LIKE BUTTON ═══ */
        #like-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 0.8rem 2rem; border-radius: 14px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            font-family: "Plus Jakarta Sans"; color: inherit;
        }
        #like-btn:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); transform: translateY(-2px); box-shadow: 0 12px 25px -10px rgba(239,68,68,0.25); }
        #like-btn.liked { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
        #like-btn.liked #like-icon { color: #ef4444; filter: drop-shadow(0 0 8px rgba(239,68,68,0.5)); }
        @keyframes heartPop { 0%{transform:scale(1)} 40%{transform:scale(1.7)} 70%{transform:scale(0.85)} 100%{transform:scale(1)} }
        .heart-pop { animation: heartPop 0.45s cubic-bezier(0.16,1,0.3,1); }
        @keyframes floatHeart { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-90px) scale(1.4)} }

        /* ═══ TAG BADGE ═══ */
        .tag-badge {
            background: rgba(0,229,143,0.08); color: #00c97d;
            padding: 4px 14px; border-radius: 8px; font-size: 0.72rem;
            font-weight: 700; display: inline-block; margin: 3px;
            border: 1px solid rgba(0,229,143,0.18);
            font-family: "Plus Jakarta Sans";
            transition: all 0.2s;
        }
        .tag-badge:hover { background: rgba(0,229,143,0.15); transform: translateY(-1px); }

        /* ═══ TOAST ═══ */
        .toast {
            position: fixed; bottom: 110px; left: 50%;
            transform: translate(-50%, 30px); opacity: 0;
            background: #0f172a; color: #fff; padding: 13px 28px;
            border-radius: 99px; font-weight: 700; font-size: 0.85rem;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1); z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
            font-family: "Plus Jakarta Sans";
        }
        .dark .toast { background: #f8fafc; color: #09090b; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        /* ═══ SCROLLBAR ═══ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00e58f; }

        /* ═══ HERO IMAGE ═══ */
        #img-container {
            position: relative;
            box-shadow: 0 30px 80px -10px rgba(0,229,143,0.08), 0 40px 120px rgba(0,0,0,0.6);
        }
        #img-container::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
            background: linear-gradient(to top, rgba(9,9,11,0.4), transparent);
            border-radius: 0 0 2rem 2rem;
            pointer-events: none;
        }

        /* ═══ GLOW TEXT ═══ */
        .glow-title { text-shadow: 0 0 60px rgba(0,229,143,0.04); }

        /* ═══ RELATED POSTS ═══ */
        .related-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.25rem; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        .related-card:hover { 
            border-color: rgba(0,229,143,0.4); 
            transform: translateY(-5px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 35px rgba(0,229,143,0.15), inset 0 0 15px rgba(0,229,143,0.05); 
        }

        /* ═══ SECTION DIVIDER ═══ */
        .section-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06) 30%, rgba(0,229,143,0.1) 50%, rgba(255,255,255,0.06) 70%, transparent); margin: 3rem 0; }

        /* Content z-index management */
        main { position: relative; z-index: 10; }
        header.sticky { position: sticky; top: 0; z-index: 50; }

        /* Light mode overrides for nav */
        html:not(.dark) .post-nav { background: rgba(255,255,255,0.85); border-bottom: 1px solid rgba(0,0,0,0.05); }
        html:not(.dark) #star-canvas { opacity: 0 !important; }
        html:not(.dark) #moon-scene { opacity: 0 !important; }
        html:not(.dark) .nebula { opacity: 0 !important; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-[#09090b] dark:text-[#f1f5f9] antialiased flex flex-col min-h-screen">

    <script>
    let post = null, allPosts = [];

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    else document.documentElement.classList.add('dark');

    const formatDate = d => d ? new Date(d).toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Mới đây';
    const getImg = img => img && img.trim() ? img : 'https://images.unsplash.com/photo-1639762681485-074b7f4fc8fd?q=80&w=1200';

    function getMetrics(id) {
        const numId = Number(id) || 1;
        const storageKey = `metrics_post_${numId}`;
        const now = Date.now();
        let metricsData = localStorage.getItem(storageKey);
        let metrics;
        if (!metricsData) {
            const seed = (numId * 997) % 10000;
            metrics = { views: 1200 + seed + (numId % 500), likes: 120 + Math.floor(seed / 10), lastUpdated: now };
        } else {
            metrics = JSON.parse(metricsData);
            const hoursPassed = (now - metrics.lastUpdated) / (1000 * 60 * 60);
            if (hoursPassed >= 1) {
                metrics.views += Math.floor(hoursPassed * (Math.random() * 8 + 3));
                metrics.likes += Math.floor(hoursPassed * (Math.random() * 2));
                metrics.lastUpdated = now;
            }
        }
        localStorage.setItem(storageKey, JSON.stringify(metrics));
        return {
            viewsFormatted: metrics.views.toLocaleString('vi-VN'),
            likesFormatted: metrics.likes.toLocaleString('vi-VN'),
            rawViews: metrics.views, rawLikes: metrics.likes
        };
    }

    function trackPostVisit(postTitle, postSlug, postId) {
        try {
            const visits = JSON.parse(localStorage.getItem('site_visits') || '[]');
            visits.push({ page: 'post', title: postTitle, slug: postSlug, ts: Date.now() });
            if (visits.length > 2000) visits.splice(0, visits.length - 2000);
            localStorage.setItem('site_visits', JSON.stringify(visits));
            if (!sessionStorage.getItem('viewed_' + postId)) {
                sessionStorage.setItem('viewed_' + postId, '1');
                const storageKey = `metrics_post_${postId}`;
                let metricsObj = JSON.parse(localStorage.getItem(storageKey));
                if (metricsObj) { metricsObj.views += 1; localStorage.setItem(storageKey, JSON.stringify(metricsObj)); }
            }
        } catch(e) {}
    }

    async function loadPost() {
        const slug = new URLSearchParams(location.search).get('slug');
        try {
            const res = await fetch('./data/posts.json?v=' + new Date().getTime(), { cache: 'no-store' });
            if (res.ok) {
                const serverPosts = await res.json();
                let localPosts = JSON.parse(localStorage.getItem('crypto_posts') || '[]');
                const serverIds = new Set(serverPosts.map(p => String(p.id)));
                const localOnlyPosts = localPosts.filter(p => p.status !== 'published' && !serverIds.has(String(p.id)));
                allPosts = [...serverPosts, ...localOnlyPosts];
                localStorage.setItem('crypto_posts', JSON.stringify(allPosts));
            }
        } catch(e) {
            try { allPosts = JSON.parse(localStorage.getItem('crypto_posts') || '[]'); } catch(err) {}
        }

        try {
            post = allPosts.find(p => p.slug === slug);
            if (!post) throw new Error("Not found");
        } catch(e) {
            document.getElementById('post-header-section').style.display = 'none';
            document.getElementById('img-container').classList.add('hidden');
            document.getElementById('post-content').innerHTML = `
                <div class="text-center py-32">
                    <div class="text-7xl mb-6">🚀</div>
                    <p class="text-red-400 font-extrabold text-3xl tracking-tight mb-3">404 - Rất tiếc!</p>
                    <p class="text-gray-500 font-serif mb-10">Bài viết này không tồn tại hoặc đã bị xóa khỏi hệ thống.</p>
                    <a href="index.html" class="inline-block px-8 py-3.5 bg-accent text-black font-bold rounded-xl transition-all hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(0,229,143,0.3)]">Quay về trang chủ</a>
                </div>`;
            return;
        }

        let metrics = getMetrics(post.id);
        trackPostVisit(post.title, post.slug, post.id);
        metrics = getMetrics(post.id);

        document.title = `${post.title} - Trading Insight`;
        document.getElementById('sticky-title').innerText = post.title;
        document.getElementById('post-category').innerHTML = `<i class="fas fa-bolt text-[9px]"></i> ${post.category || 'ARTICLE'}`;
        document.getElementById('post-title').innerText = post.title;
        document.getElementById('post-author').innerText = post.author || 'Trading Insight';
        document.getElementById('post-date').innerText = formatDate(post.date);
        const wordCount = (post.content || '').trim().split(/\s+/).length;
        document.getElementById('post-read-time').innerHTML = `<i class="far fa-clock text-accent/70"></i> ${Math.max(1, Math.ceil(wordCount / 250))} phút đọc`;
        document.getElementById('post-views').innerHTML = `<i class="far fa-eye text-accent"></i> ${metrics.viewsFormatted}`;
        document.getElementById('post-likes-display').innerHTML = `<i class="far fa-heart text-red-400"></i> ${metrics.likesFormatted}`;

        if (post.image) {
            document.getElementById('post-image').src = post.image;
            document.getElementById('img-container').classList.remove('hidden');
        }

        marked.setOptions({ breaks: true, gfm: true });
        document.getElementById('post-content').innerHTML = marked.parse(post.content || '');

        if (post.tags && post.tags.length) {
            document.getElementById('post-tags').innerHTML = post.tags.map(tag => `<span class="tag-badge">#${escapeHtml(tag.trim())}</span>`).join('');
        }

        generateTOC();
        loadLikes(metrics.rawLikes);
        renderRelated();
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    let currentLikeTotal = 0;
    function loadLikes(rawLikes) {
        currentLikeTotal = rawLikes;
        const liked = localStorage.getItem(`liked_${post.id}`);
        const likeBtn = document.getElementById('like-btn');
        document.getElementById('like-count').innerText = currentLikeTotal.toLocaleString('vi-VN');
        if (liked) {
            likeBtn.classList.add('liked');
            document.getElementById('like-icon').className = 'fas fa-heart text-xl text-red-500';
        }
    }

    function handleLike() {
        if (localStorage.getItem(`liked_${post.id}`)) return;
        localStorage.setItem(`liked_${post.id}`, '1');
        const storageKey = `metrics_post_${post.id}`;
        let metricsObj = JSON.parse(localStorage.getItem(storageKey));
        if (metricsObj) {
            metricsObj.likes += 1;
            localStorage.setItem(storageKey, JSON.stringify(metricsObj));
            currentLikeTotal = metricsObj.likes;
        } else { currentLikeTotal += 1; }
        const likeIcon = document.getElementById('like-icon');
        likeIcon.className = 'fas fa-heart text-xl heart-pop text-red-500';
        document.getElementById('like-btn').classList.add('liked');
        document.getElementById('like-count').innerText = currentLikeTotal.toLocaleString('vi-VN');
        document.getElementById('post-likes-display').innerHTML = `<i class="fas fa-heart text-red-400"></i> ${currentLikeTotal.toLocaleString('vi-VN')}`;
        createHeartBurst();
    }

    function createHeartBurst() {
        const btn = document.getElementById('like-btn');
        const rect = btn.getBoundingClientRect();
        for (let i = 0; i < 8; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            const tx = (Math.random() - 0.5) * 100;
            heart.style.cssText = `position:fixed;left:${rect.left + rect.width/2}px;top:${rect.top+10}px;font-size:${12+Math.random()*14}px;pointer-events:none;z-index:9999;animation:floatHeart 1s ease-out forwards;--tx:${tx}px;transform:translateX(${tx}px)`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

    function renderRelated() {
        const related = allPosts.filter(p =>
            p.slug !== post.slug && p.status === 'published' &&
            (p.category === post.category || (p.tags && post.tags && p.tags.some(t => post.tags.includes(t))))
        ).slice(0, 3);
        if (related.length === 0) return;
        const container = document.createElement('div');
        container.className = 'mt-12';
        container.innerHTML = `
            <div class="section-divider"></div>
            <h3 class="text-lg font-extrabold mb-7 flex items-center gap-3 dark:text-white">
                <i class="fas fa-layer-group text-accent text-base"></i> Bài Viết Đề Xuất
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                ${related.map(p => {
                    const m = getMetrics(p.id);
                    return `<a href="post.html?slug=${p.slug}" class="related-card group block p-3">
                        <div class="aspect-video rounded-xl overflow-hidden mb-3.5 relative">
                            <img src="${getImg(p.image)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500"></div>
                            <span class="absolute top-2.5 left-2.5 bg-black/60 backdrop-blur-md text-white text-[9px] font-bold px-2 py-0.5 rounded-md uppercase tracking-widest">${p.category || 'TIN TỨC'}</span>
                        </div>
                        <h4 class="font-bold text-sm group-hover:text-accent transition-colors line-clamp-2 mb-3 leading-snug dark:text-gray-200">${p.title}</h4>
                        <div class="flex gap-4 text-xs text-gray-500 font-semibold">
                            <span><i class="far fa-eye mr-1 text-accent/70"></i>${m.viewsFormatted}</span>
                            <span><i class="far fa-heart mr-1 text-red-400/70"></i>${m.likesFormatted}</span>
                        </div>
                    </a>`;
                }).join('')}
            </div>`;
        document.getElementById('post-content').parentElement.appendChild(container);
    }

    function generateTOC() {
        const headings = document.querySelectorAll('.markdown-body h2, .markdown-body h3');
        const toc = document.getElementById('toc');
        if (headings.length === 0) {
            toc.innerHTML = '<span class="text-xs text-gray-600 italic">Không có mục lục</span>';
            return;
        }
        headings.forEach((h, i) => {
            const id = `heading-${i}`;
            h.id = id;
            const link = document.createElement('a');
            link.href = `#${id}`;
            link.innerText = h.innerText;
            link.className = `toc-link ${h.tagName === 'H3' ? 'ml-3 text-[11px] opacity-75' : ''}`;
            link.addEventListener('click', e => {
                e.preventDefault();
                window.scrollTo({ top: h.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
            });
            toc.appendChild(link);
        });
        window.addEventListener('scroll', () => {
            let current = '';
            headings.forEach(h => { if (window.scrollY >= h.offsetTop - 140) current = h.id; });
            document.querySelectorAll('.toc-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${current}`) link.classList.add('active');
            });
        }, { passive: true });
    }

    window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById('progress-bar').style.width = (winScroll / height * 100) + '%';
        
        const stickyTitle = document.getElementById('sticky-title');
        const navLogo = document.getElementById('nav-logo');
        
        if (winScroll > 450) {
            stickyTitle.classList.remove('opacity-0', 'translate-y-2');
            navLogo.classList.add('opacity-0', '-translate-y-2');
        } else {
            stickyTitle.classList.add('opacity-0', 'translate-y-2');
            navLogo.classList.remove('opacity-0', '-translate-y-2');
        }
    }, { passive: true });

    function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(location.href)}`); }
    function copyLink() { navigator.clipboard.writeText(location.href); showToast(); }
    function showToast() { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

    // ═══ UNIVERSE ENGINE TƯƠNG TÁC PARALLAX & DRAG-DROP ASTRONAUT CHUẨN ═══
    function initUniverse() {
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas, { passive: true });

        // Parallax Chuột
        let mousePanX = 0;
        let mousePanY = 0;
        document.addEventListener('mousemove', (e) => {
            mousePanX = (e.clientX / W - 0.5) * 2;
            mousePanY = (e.clientY / H - 0.5) * 2;
        });

        const MAX_STARS = 400;
        const stars = [];
        for (let i = 0; i < MAX_STARS; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.5 + 0.1, 
                alpha: Math.random(),
                speedX: (Math.random() - 0.5) * 0.1, 
                speedY: (Math.random() - 0.5) * 0.1,
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                color: Math.random() > 0.8 ? '100, 200, 255' : (Math.random() > 0.8 ? '255, 230, 150' : '255, 255, 255')
            });
        }

        const meteors = [];
        function spawnMeteor() {
            if (Math.random() < 0.015 && meteors.length < 2) {
                meteors.push({
                    x: Math.random() * W * 1.5,
                    y: Math.random() * (H * 0.3) - 100, 
                    vx: -(Math.random() * 8 + 6), 
                    vy: Math.random() * 5 + 4,
                    len: Math.random() * 80 + 50,
                    life: 1.0,
                    decay: Math.random() * 0.015 + 0.01
                });
            }
        }

        let frame = 0;
        function drawFrame() {
            ctx.clearRect(0, 0, W, H);
            
            stars.forEach(s => {
                s.x += s.speedX - (mousePanX * s.r * 0.8);
                s.y += s.speedY - (mousePanY * s.r * 0.8);
                
                if (s.x < -10) s.x = W + 10;
                if (s.x > W + 10) s.x = -10;
                if (s.y < -10) s.y = H + 10;
                if (s.y > H + 10) s.y = -10;

                s.alpha += Math.sin(frame * s.twinkleSpeed) * 0.015;
                if (s.alpha < 0.1) s.alpha = 0.1;
                if (s.alpha > 1) s.alpha = 1;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${s.color}, ${s.alpha})`;
                
                if (s.alpha > 0.8 && s.r > 1.2) {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = `rgba(${s.color}, 0.8)`;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fill();
            });

            ctx.shadowBlur = 0;

            spawnMeteor();
            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.x += m.vx;
                m.y += m.vy;
                m.life -= m.decay;

                if (m.life <= 0 || m.x < 0 || m.y > H) {
                    meteors.splice(i, 1);
                    continue;
                }

                const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.vx * (m.len/10), m.y - m.vy * (m.len/10));
                grad.addColorStop(0, `rgba(255, 255, 255, ${m.life})`);
                grad.addColorStop(1, `rgba(0, 229, 143, 0)`); 

                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - m.vx * (m.len/10), m.y - m.vy * (m.len/10));
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(m.x, m.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${m.life})`;
                ctx.fill();
            }

            frame++;
            requestAnimationFrame(drawFrame);
        }
        drawFrame();

        // --- ASTRONAUTS ĐỘI QUÂN ĐÃ DỌN SẠCH LỖI VIỀN ---
        const moonScene = document.getElementById('moon-scene');
        const astros = [];
        const ASTRO_COUNT = 3;

        for(let i=0; i<ASTRO_COUNT; i++) {
            let el = document.createElement('div');
            el.className = 'moon-astronaut';
            // Gọi GIF phi hành gia súng nước xịn xò
            el.innerHTML = `<img src="https://i.postimg.cc/sfNhRJwS/87a2d79d6172857242ddcf9fcb4ec998.png" alt="Astronaut">`;
            moonScene.appendChild(el);
            
            let astro = {
                el: el,
                x: window.innerWidth * 0.1 + (Math.random() * window.innerWidth * 0.8),
                y: 50 + Math.random() * 40,
                // Tốc độ nhanh hơn bản cũ một chút
                vx: (Math.random() > 0.5 ? 1 : -1) * (0.8 + Math.random() * 1.5), 
                vy: 0,
                isDragging: false,
                isJumping: false
            };
            astros.push(astro);
            
            // Kéo thả (Drag & Drop)
            let startX, startY, initialX, initialY;
            
            const dragStart = (e) => {
                astro.isDragging = true;
                el.style.cursor = 'grabbing';
                el.style.transform = 'scale(1.1)';
                startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX; 
                startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                initialX = astro.x; 
                initialY = astro.y;
                if(e.cancelable) e.preventDefault();
            };
            
            const dragMove = (e) => {
                if(!astro.isDragging) return;
                let clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                let dx = clientX - startX;
                let dy = clientY - startY;
                astro.x = initialX + dx;
                astro.y = initialY - dy; // Y invert vì tính từ bottom lên
                el.style.left = astro.x + 'px';
                el.style.bottom = astro.y + 'px';
            };
            
            const dragEnd = () => {
                if(astro.isDragging) {
                    astro.isDragging = false;
                    el.style.cursor = 'grab';
                    el.style.transform = 'scale(1)';
                    // Ném nhẹ (Thêm lực rơi tự do khi thả)
                    astro.vy = 2; 
                }
            };

            el.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);
            
            // Hỗ trợ Touch trên Mobile
            el.addEventListener('touchstart', dragStart, {passive: false});
            document.addEventListener('touchmove', dragMove, {passive: false});
            document.addEventListener('touchend', dragEnd);
        }

        // Vòng lặp Physics cho Phi Hành Gia
        function updateAstros() {
            astros.forEach(a => {
                if(a.isDragging) return;
                
                // Di chuyển ngang
                a.x += a.vx;
                // Vòng qua màn hình
                if(a.x < -100) a.x = window.innerWidth + 50;
                if(a.x > window.innerWidth + 100) a.x = -50;
                
                // Trọng lực & Nhảy
                if(a.y > 50) {
                    a.vy -= 0.3; // Lực hút
                }
                a.y += a.vy;
                
                if(a.y <= 50) {
                    a.y = 50;
                    a.vy = 0;
                    a.isJumping = false;
                }
                
                // Random bay nhảy tung tăng
                if(!a.isJumping && Math.random() < 0.01) { 
                    a.vy = 5 + Math.random() * 5; // Lực nhảy
                    a.isJumping = true;
                    // Lâu lâu đổi hướng khi nhảy
                    if(Math.random() > 0.5) a.vx *= -1;
                }
                
                a.el.style.left = a.x + 'px';
                a.el.style.bottom = a.y + 'px';
                
                // Lật ảnh theo hướng di chuyển
                const img = a.el.querySelector('img');
                if(a.vx > 0) img.style.transform = 'scaleX(1)'; 
                else img.style.transform = 'scaleX(-1)';
            });
            requestAnimationFrame(updateAstros);
        }
        updateAstros();
    }

    document.addEventListener('DOMContentLoaded', () => {
        initUniverse();
        loadPost();
    });

    const styleEl = document.createElement('style');
    styleEl.textContent = `@keyframes floatHeart { 0%{opacity:1;transform:translateY(0) translateX(var(--tx,0)) scale(1)} 100%{opacity:0;transform:translateY(-90px) translateX(var(--tx,0)) scale(1.5)} }`;
    document.head.appendChild(styleEl);
    </script>
</body>
