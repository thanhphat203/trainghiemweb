<!DOCTYPE html>
<html lang="vi" class="dark scroll-smooth">
<head>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%2300e58f' d='M211.5 5.5c24.5-7.3 50.5-7.3 75 0l160 48c22.4 6.7 37.5 27.6 37.5 50.5s-15.1 43.8-37.5 50.5l-160 48c-24.5 7.3-50.5 7.3-75 0l-160-48C29.1 147.8 14 126.9 14 104s15.1-43.8 37.5-50.5l160-48zM14 266.3l48.4-14.5c21.8 19 50 31.8 81 37.8L59.2 314.8C36.8 321.5 21.7 342.4 21.7 365.3s15.1 43.8 37.5 50.5l160 48c24.5 7.3 50.5 7.3 75 0l160-48c22.4-6.7 37.5-27.6 37.5-50.5s-15.1-43.8-37.5-50.5l-84.2-25.2c31-6 59.2-18.8 81-37.8l48.4 14.5c22.4 6.7 37.5 27.6 37.5 50.5s-15.1 43.8-37.5 50.5l-160 48c-24.5 7.3-50.5 7.3-75 0l-160-48C29.1 395.8 14 374.9 14 352s15.1-43.8 37.5-50.5z'/%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Article - Trading Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{accent:'#00e58f'},fontFamily:{sans:['"Plus Jakarta Sans"','sans-serif'],serif:['"Lora"','serif']}}}}</script>
    <style>
        :root{--fs:1}
        body{transition:background-color .4s,color .4s}
        ::selection{background:#00e58f;color:#09090b}

        /* Progress bar */
        #progress-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#00e58f,#22c55e);width:0%;z-index:9999;box-shadow:0 0 8px rgba(0,229,143,.5)}

        /* Header */
        .site-header{
            position:sticky;top:0;z-index:50;
            background:rgba(255,255,255,.92);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(0,0,0,.06);
            overflow:visible;
        }
        .dark .site-header{
            background:rgba(9,9,11,.88);
            border-bottom-color:rgba(255,255,255,.05);
        }
        .hbtn{
            width:36px;height:36px;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;font-size:.85rem;
            border:1px solid rgba(0,0,0,.07);
            background:rgba(0,0,0,.02);color:#64748b;
            transition:all .22s cubic-bezier(.16,1,.3,1);
            position:relative;
        }
        .dark .hbtn{border-color:rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#94a3b8}
        .hbtn:hover{border-color:rgba(0,229,143,.35);color:#00e58f;background:rgba(0,229,143,.08)}
        .hbtn.on{border-color:rgba(0,229,143,.4);color:#00e58f;background:rgba(0,229,143,.1)}
        .hbtn-group{display:flex;border:1px solid rgba(0,0,0,.07);border-radius:10px;overflow:hidden;background:rgba(0,0,0,.02)}
        .dark .hbtn-group{border-color:rgba(255,255,255,.07);background:rgba(255,255,255,.03)}
        .hbtn-group .hbtn{border:none;border-radius:0;width:32px;height:32px}
        .hbtn-group .hdiv{width:1px;background:rgba(0,0,0,.07)}
        .dark .hbtn-group .hdiv{background:rgba(255,255,255,.07)}

        /* Read strip */
        .read-strip{height:2px;background:rgba(0,0,0,.04);position:sticky;top:57px;z-index:49}
        .dark .read-strip{background:rgba(255,255,255,.04)}
        #rstrip-fill{height:100%;background:linear-gradient(90deg,#00e58f,#22c55e);width:0%;transition:width .1s}

        /* Markdown */
        .md{font-size:calc(1.1rem*var(--fs));line-height:1.9;font-family:'Lora',serif;color:#374151}
        .dark .md{color:#c9d1d9}
        .md h2,.md h3{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;letter-spacing:-.02em}
        .md h2{font-size:calc(1.7rem*var(--fs));margin:3.5rem 0 1.25rem;padding-bottom:.75rem;border-bottom:1px solid rgba(0,229,143,.1);color:#111827}
        .dark .md h2{color:#f8fafc}
        .md h3{font-size:calc(1.25rem*var(--fs));margin:2.5rem 0 1rem;color:#1e293b}
        .dark .md h3{color:#e2e8f0}
        .md p{margin-bottom:1.6rem}
        .md img{border-radius:1.25rem;width:100%;margin:2.5rem 0;border:1px solid rgba(0,0,0,.05);box-shadow:0 8px 24px rgba(0,0,0,.06)}
        .dark .md img{border-color:rgba(255,255,255,.05);box-shadow:0 8px 24px rgba(0,0,0,.4)}
        .md blockquote{margin:2.5rem 0;padding:1.25rem 1.75rem;border-left:3px solid #00e58f;background:rgba(0,229,143,.04);border-radius:0 12px 12px 0;font-style:italic}
        .md a{color:#00e58f;font-weight:600;text-decoration:none;border-bottom:1px dashed rgba(0,229,143,.5);transition:all .2s}
        .md a:hover{background:rgba(0,229,143,.08);border-bottom-style:solid}
        .md ul{list-style:none;padding-left:0;margin-bottom:1.5rem}
        .md ul li{padding-left:1.5rem;position:relative;margin-bottom:.5rem}
        .md ul li::before{content:'▸';position:absolute;left:0;color:#00e58f;font-size:.8em;top:.15em}
        .md ol{list-style:decimal;padding-left:1.5rem;margin-bottom:1.5rem}
        .md li{margin-bottom:.5rem}
        .md strong{font-weight:800;color:#111827}
        .dark .md strong{color:#f8fafc}
        .md table{width:100%;border-collapse:collapse;margin:2rem 0;font-size:.88em;font-family:'Plus Jakarta Sans',sans-serif}
        .md th{background:rgba(0,229,143,.08);padding:.7rem 1rem;text-align:left;font-weight:800;font-size:.76rem;text-transform:uppercase;letter-spacing:.06em;color:#00e58f;border-bottom:2px solid rgba(0,229,143,.15)}
        .md td{padding:.7rem 1rem;border-bottom:1px solid rgba(0,0,0,.05)}
        .dark .md td{border-color:rgba(255,255,255,.05)}
        .md tr:hover td{background:rgba(0,229,143,.03)}

        /* Code */
        .md code{background:rgba(0,229,143,.08);border-radius:5px;padding:2px 7px;font-size:.83em;font-family:'Fira Code','Courier New',monospace;color:#00c97d}
        .dark .md code{background:rgba(0,229,143,.1);color:#00e58f}
        .cbw{position:relative;margin:2rem 0}
        .md pre{background:#0d1117;border-radius:1rem;padding:1.5rem;overflow-x:auto;border:1px solid rgba(255,255,255,.06)}
        .md pre code{background:transparent;color:#e2e8f0;padding:0;font-size:.875em;line-height:1.75}
        .cpybtn{position:absolute;top:.7rem;right:.7rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;border-radius:7px;padding:.3rem .7rem;font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:.35rem}
        .cpybtn:hover{background:rgba(0,229,143,.12);color:#00e58f;border-color:rgba(0,229,143,.3)}
        .cpybtn.ok{color:#00e58f;border-color:#00e58f}

        /* TOC */
        .toc-a{display:block;padding:.42rem 0 .42rem 1rem;border-left:2px solid transparent;color:#64748b;font-size:.8rem;font-family:'Plus Jakarta Sans';transition:all .2s}
        .toc-a:hover{color:#00e58f;border-left-color:rgba(0,229,143,.4)}
        .toc-a.on{color:#00e58f;border-left-color:#00e58f;font-weight:700;background:linear-gradient(90deg,rgba(0,229,143,.06),transparent)}

        /* Tags */
        .tag{background:rgba(0,229,143,.08);color:#00c97d;padding:.28rem .9rem;border-radius:8px;font-size:.72rem;font-weight:700;display:inline-block;font-family:'Plus Jakarta Sans';border:1px solid rgba(0,229,143,.15);transition:all .2s;cursor:pointer;margin:.2rem}
        .tag:hover{background:rgba(0,229,143,.15);transform:translateY(-1px)}

        /* Like */
        #like-btn{display:inline-flex;align-items:center;gap:10px;padding:.75rem 1.6rem;border-radius:14px;background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.06);font-weight:700;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1)}
        .dark #like-btn{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)}
        #like-btn:hover{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2);transform:translateY(-2px);box-shadow:0 8px 20px -8px rgba(239,68,68,.25)}
        #like-btn.liked{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25)}
        #like-btn.liked #like-icon{color:#ef4444;filter:drop-shadow(0 0 8px rgba(239,68,68,.5))}
        @keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.6)}70%{transform:scale(.9)}100%{transform:scale(1)}}
        .hpop{animation:heartPop .45s cubic-bezier(.16,1,.3,1)}

        /* Meta stat */
        .mstat{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:10px;background:rgba(0,0,0,.03);font-size:.82rem;font-weight:700;border:1px solid rgba(0,0,0,.04)}
        .dark .mstat{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.05)}

        /* Back to top */
        #b2t{position:fixed;bottom:2rem;right:2rem;z-index:80;width:44px;height:44px;border-radius:50%;background:#00e58f;color:#09090b;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;box-shadow:0 6px 22px rgba(0,229,143,.35);transform:translateY(70px) scale(.8);opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1)}
        #b2t.v{transform:translateY(0) scale(1);opacity:1}
        #b2t:hover{transform:translateY(-3px) scale(1.08)!important;box-shadow:0 12px 30px rgba(0,229,143,.45)}

        /* Mobile TOC trigger */
        #toc-trig{position:fixed;bottom:2rem;left:2rem;z-index:79;padding:.5rem 1rem;border-radius:999px;background:rgba(9,9,11,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.09);color:#94a3b8;font-size:.74rem;font-weight:700;cursor:pointer;display:none;align-items:center;gap:.45rem;transition:all .3s}
        @media(max-width:1023px){#toc-trig{display:flex}}
        #toc-trig:hover{border-color:#00e58f;color:#00e58f}

        /* TOC Drawer */
        #toc-drawer{position:fixed;bottom:0;left:0;right:0;z-index:90;background:#0a0a0c;border:1px solid rgba(255,255,255,.07);border-radius:1.5rem 1.5rem 0 0;padding:1.5rem;max-height:70vh;overflow-y:auto;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
        #toc-drawer.open{transform:translateY(0)}
        #toc-bd{position:fixed;inset:0;z-index:89;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
        #toc-bd.show{opacity:1;pointer-events:all}

        /* Share dropdown */
        .sdrop{position:absolute;top:calc(100% + 10px);right:0;background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:1rem;padding:.5rem;box-shadow:0 16px 40px rgba(0,0,0,.1);min-width:180px;z-index:60;opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .22s cubic-bezier(.16,1,.3,1)}
        .dark .sdrop{background:#18181b;border-color:rgba(255,255,255,.07);box-shadow:0 16px 40px rgba(0,0,0,.5)}
        .sdrop.open{opacity:1;pointer-events:all;transform:translateY(0)}
        .sitem{display:flex;align-items:center;gap:.7rem;padding:.55rem .85rem;border-radius:.6rem;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;color:#374151}
        .dark .sitem{color:#d1d5db}
        .sitem:hover{background:rgba(0,229,143,.08);color:#00e58f}
        .sico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}

        /* Font ctrl */
        .fcbtn{width:32px;height:32px;border-radius:0;border:none;background:transparent;cursor:pointer;font-weight:700;color:#64748b;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center}
        .dark .fcbtn{color:#94a3b8}
        .fcbtn:hover{color:#00e58f;background:rgba(0,229,143,.08)}

        /* Toast */
        .toast{position:fixed;bottom:26px;left:50%;transform:translate(-50%,70px);background:#0f172a;color:#fff;padding:11px 22px;border-radius:99px;font-weight:700;opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;font-size:.86rem;border:1px solid rgba(0,229,143,.15);white-space:nowrap;pointer-events:none}
        .dark .toast{background:#18181b}
        .toast.show{transform:translate(-50%,0);opacity:1}

        /* Highlight share */
        #hlshare{position:fixed;z-index:300;background:#111827;border-radius:10px;padding:.35rem .65rem;display:none;gap:.4rem;align-items:center;box-shadow:0 8px 28px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.08)}
        .dark #hlshare{background:#1c1c1f}
        .hsbtn{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.72rem;transition:all .2s;border:none}
        .hsbtn:hover{transform:scale(1.15)}

        /* Sidebar block */
        .sblock{border-radius:1.2rem;padding:1.2rem 1.4rem;border:1px solid rgba(0,0,0,.05);background:#fafafa}
        .dark .sblock{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05)}

        /* ═══ COMMENTS — PREMIUM REDESIGN ═══ */
        .cmt-section{margin-top:4rem;padding-top:3rem;border-top:1px solid rgba(0,0,0,.07)}
        .dark .cmt-section{border-top-color:rgba(255,255,255,.06)}
        .cmt-head{display:flex;align-items:center;gap:.9rem;margin-bottom:2rem}
        .cmt-ico{width:34px;height:34px;border-radius:10px;background:rgba(0,229,143,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .cmt-title{font-size:1.2rem;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-.01em;color:#111827}
        .dark .cmt-title{color:#f8fafc}
        .cmt-count-badge{background:rgba(0,229,143,.12);color:#00e58f;font-size:.7rem;font-weight:800;padding:.18rem .65rem;border-radius:999px;border:1px solid rgba(0,229,143,.2);font-family:'Plus Jakarta Sans'}

        /* Form */
        .cmt-form{background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.07);border-radius:1.4rem;padding:1.4rem;margin-bottom:2rem}
        .dark .cmt-form{background:rgba(255,255,255,.025);border-color:rgba(255,255,255,.07)}
        .cmt-form-top{display:flex;align-items:center;gap:.9rem;margin-bottom:1rem}
        .cmt-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;flex-shrink:0;font-family:'Plus Jakarta Sans';background:rgba(0,229,143,.1);color:#00e58f;transition:background .3s,color .3s}
        .cmt-name-in{flex:1;background:transparent;border:none;outline:none;font-family:'Plus Jakarta Sans';font-size:.88rem;font-weight:700;color:#1e293b;padding:0}
        .dark .cmt-name-in{color:#f1f5f9}
        .cmt-name-in::placeholder{color:#94a3b8;font-weight:500}
        .cmt-div{height:1px;background:rgba(0,0,0,.05);margin:.85rem 0}
        .dark .cmt-div{background:rgba(255,255,255,.05)}
        .cmt-ta{width:100%;background:transparent;border:none;outline:none;resize:none;font-family:'Lora',serif;font-size:.92rem;line-height:1.7;color:#374151;min-height:72px}
        .dark .cmt-ta{color:#d1d5db}
        .cmt-ta::placeholder{color:#94a3b8;font-family:'Plus Jakarta Sans';font-weight:400}
        .cmt-foot{display:flex;align-items:center;justify-content:space-between;padding-top:.9rem;border-top:1px solid rgba(0,0,0,.04);gap:.75rem}
        .dark .cmt-foot{border-top-color:rgba(255,255,255,.04)}
        .cmt-sub{padding:.6rem 1.4rem;border-radius:10px;background:#00e58f;color:#09090b;font-weight:800;font-size:.82rem;border:none;cursor:pointer;transition:all .28s cubic-bezier(.16,1,.3,1);font-family:'Plus Jakarta Sans';display:flex;align-items:center;gap:.45rem;flex-shrink:0}
        .cmt-sub:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,229,143,.3)}
        .cmt-sub:active{transform:scale(.97)}

        /* Comment cards */
        .cmt-card{padding:1.2rem 1.4rem;border-radius:1.2rem;border:1px solid rgba(0,0,0,.05);background:#fff;margin-bottom:.85rem;animation:cmtIn .35s cubic-bezier(.16,1,.3,1) forwards}
        .dark .cmt-card{background:rgba(255,255,255,.025);border-color:rgba(255,255,255,.05)}
        @keyframes cmtIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .cmt-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
        .cmt-card-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;font-family:'Plus Jakarta Sans'}
        .cmt-card-name{font-size:.85rem;font-weight:800;color:#1e293b;font-family:'Plus Jakarta Sans'}
        .dark .cmt-card-name{color:#f1f5f9}
        .cmt-card-time{font-size:.7rem;color:#94a3b8;font-weight:500}
        .cmt-card-text{font-size:.88rem;line-height:1.7;color:#4b5563;font-family:'Plus Jakarta Sans'}
        .dark .cmt-card-text{color:#9ca3af}
        .cmt-actions{display:flex;gap:.6rem;margin-top:.65rem;padding-top:.65rem;border-top:1px solid rgba(0,0,0,.04)}
        .dark .cmt-actions{border-top-color:rgba(255,255,255,.04)}
        .cmt-act{display:flex;align-items:center;gap:.38rem;font-size:.74rem;font-weight:700;color:#94a3b8;cursor:pointer;background:none;border:none;font-family:'Plus Jakarta Sans';padding:.2rem .5rem;border-radius:6px;transition:all .2s}
        .cmt-act:hover{color:#00e58f;background:rgba(0,229,143,.06)}
        .cmt-act.lkd{color:#ef4444}
        .cmt-act.lkd:hover{background:rgba(239,68,68,.06)}

        /* Empty state */
        .cmt-empty{text-align:center;padding:2.5rem 1rem}
        .cmt-empty-ico{width:56px;height:56px;border-radius:18px;background:rgba(0,229,143,.06);border:1px solid rgba(0,229,143,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem}

        /* Related card */
        .rel-card{display:block;border-radius:1.2rem;overflow:hidden;border:1px solid rgba(0,0,0,.06);background:#fff;transition:all .32s cubic-bezier(.16,1,.3,1)}
        .dark .rel-card{background:rgba(255,255,255,.025);border-color:rgba(255,255,255,.05)}
        .rel-card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.07);border-color:rgba(0,229,143,.2)}
        .dark .rel-card:hover{box-shadow:0 14px 36px rgba(0,0,0,.3)}
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-[#09090b] dark:text-[#f8fafc] antialiased flex flex-col min-h-screen">

    <div id="progress-bar"></div>

    <!-- ══ HEADER ══ -->
    <header class="site-header">
        <div class="container mx-auto px-4 sm:px-6 max-w-[1300px] h-[58px] flex items-center justify-between gap-3">
            <!-- Left -->
            <div class="flex items-center gap-3 min-w-0 flex-1">
                <a href="index.html" class="hbtn flex-shrink-0" title="Quay lại trang chủ">
                    <i class="fas fa-arrow-left text-xs"></i>
                </a>
                <span id="sticky-title" class="hidden md:block text-[13px] font-bold text-gray-500 dark:text-gray-400 truncate max-w-xs lg:max-w-md opacity-0 transition-opacity duration-300"></span>
            </div>
            <!-- Right -->
            <div class="flex items-center gap-1.5 flex-shrink-0">
                <!-- Font size group -->
                <div class="hidden sm:flex hbtn-group mr-0.5">
                    <button class="fcbtn" onclick="changeFontSize(-.1)" title="Giảm cỡ chữ">A<sup style="font-size:7px;font-weight:900">−</sup></button>
                    <div class="hdiv"></div>
                    <button class="fcbtn" onclick="changeFontSize(.1)" title="Tăng cỡ chữ">A<sup style="font-size:8px;font-weight:900">+</sup></button>
                </div>
                <!-- Bookmark -->
                <button id="bkbtn" class="hbtn" onclick="toggleBookmark()" title="Lưu bài viết">
                    <i id="bkicon" class="far fa-bookmark text-xs"></i>
                </button>
                <!-- Share -->
                <div class="relative">
                    <button id="shbtn" class="hbtn" onclick="toggleShare()" title="Chia sẻ">
                        <i class="fas fa-share-nodes text-xs"></i>
                    </button>
                    <div class="sdrop" id="sdrop">
                        <div class="sitem" onclick="shareX()"><div class="sico bg-[#1DA1F2]/10 text-[#1DA1F2]"><i class="fab fa-twitter"></i></div>Twitter / X</div>
                        <div class="sitem" onclick="shareTG()"><div class="sico bg-[#0088cc]/10 text-[#0088cc]"><i class="fab fa-telegram-plane"></i></div>Telegram</div>
                        <div class="sitem" onclick="shareFB()"><div class="sico bg-[#1877F2]/10 text-[#1877F2]"><i class="fab fa-facebook-f"></i></div>Facebook</div>
                        <div class="sitem" onclick="copyLink()"><div class="sico bg-gray-100 dark:bg-white/5 text-gray-500"><i class="fas fa-link"></i></div>Sao chép link</div>
                    </div>
                </div>
                <!-- Theme -->
                <button class="hbtn" onclick="toggleTheme()" title="Đổi giao diện">
                    <i class="fas fa-moon dark:hidden text-xs"></i>
                    <i class="fas fa-sun hidden dark:inline text-xs text-yellow-400"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Read progress strip -->
    <div class="read-strip"><div id="rstrip-fill"></div></div>

    <!-- Back to top -->
    <button id="b2t" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Lên đầu trang">
        <i class="fas fa-arrow-up text-xs font-black"></i>
    </button>

    <!-- Mobile TOC trigger -->
    <button id="toc-trig" onclick="openTOC()">
        <i class="fas fa-list-ul text-accent text-[10px]"></i> Mục lục
    </button>

    <!-- TOC Drawer -->
    <div id="toc-bd" onclick="closeTOC()"></div>
    <div id="toc-drawer">
        <div class="flex items-center justify-between mb-5">
            <h4 class="text-sm font-extrabold text-white flex items-center gap-2"><i class="fas fa-list-ul text-accent text-xs"></i>Mục lục</h4>
            <button onclick="closeTOC()" class="w-7 h-7 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white"><i class="fas fa-times text-xs"></i></button>
        </div>
        <nav id="toc-mob" class="flex flex-col space-y-0.5"></nav>
    </div>

    <!-- Highlight-to-share popup -->
    <div id="hlshare">
        <span class="text-[9px] font-bold text-gray-500 uppercase tracking-wider">Trích:</span>
        <button class="hsbtn bg-[#1DA1F2]/15 text-[#1DA1F2]" id="hs-x"><i class="fab fa-twitter"></i></button>
        <button class="hsbtn bg-[#0088cc]/15 text-[#0088cc]" id="hs-tg"><i class="fab fa-telegram-plane"></i></button>
        <button class="hsbtn bg-white/8 text-gray-300" id="hs-cp"><i class="fas fa-copy"></i></button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle text-accent text-sm"></i>
        <span id="toast-msg">OK</span>
    </div>

    <!-- ══ MAIN ══ -->
    <main class="flex-grow pt-10 pb-28">
        <article class="container mx-auto px-4 max-w-[1100px]">

            <!-- POST HEADER -->
            <header class="text-center mb-12 max-w-3xl mx-auto" id="post-hd">
                <div class="mb-5">
                    <span id="post-cat" class="text-[11px] font-extrabold uppercase tracking-widest bg-accent/10 text-accent px-4 py-1.5 rounded-lg border border-accent/20">CATEGORY</span>
                </div>
                <h1 id="post-title" class="text-3xl md:text-[2.6rem] font-extrabold leading-[1.2] tracking-tight mb-6 text-gray-900 dark:text-white">Đang tải...</h1>
                <div class="flex items-center justify-center flex-wrap gap-3 text-[12px] font-semibold text-gray-500 dark:text-gray-400 mb-6">
                    <div class="flex items-center gap-2">
                        <img src="https://ui-avatars.com/api/?name=Trading+Insight&background=00e58f&color=050505&size=64" class="w-7 h-7 rounded-full">
                        <span id="post-author" class="font-bold text-gray-700 dark:text-gray-300">Trading Insight</span>
                    </div>
                    <span class="w-1 h-1 bg-gray-300 dark:bg-white/20 rounded-full"></span>
                    <span id="post-date">—</span>
                    <span class="w-1 h-1 bg-gray-300 dark:bg-white/20 rounded-full"></span>
                    <span id="post-rt" class="flex items-center gap-1.5"><i class="far fa-clock text-accent/70"></i> — phút đọc</span>
                </div>
                <div class="flex items-center justify-center gap-3">
                    <span id="post-views" class="mstat"><i class="far fa-eye text-accent"></i> —</span>
                    <span id="post-likes-disp" class="mstat"><i class="far fa-heart text-red-400"></i> —</span>
                </div>
            </header>

            <!-- COVER IMAGE -->
            <div class="w-full aspect-[16/9] md:aspect-[2.4/1] rounded-[1.75rem] overflow-hidden mb-14 hidden relative bg-gray-100 dark:bg-[#121214] shadow-xl" id="imgbox">
                <img id="post-img" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/15 to-transparent pointer-events-none"></div>
            </div>

            <!-- CONTENT + SIDEBAR -->
            <div class="flex flex-col lg:flex-row gap-14">

                <!-- MAIN COL -->
                <div class="flex-1 min-w-0" id="main-col">
                    <div id="post-body" class="md"></div>

                    <!-- FOOTER -->
                    <div class="mt-16 pt-8 border-t border-gray-100 dark:border-white/[0.06] space-y-5" id="post-ft">
                        <div id="post-tags" class="flex flex-wrap gap-1 -m-0.5"></div>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                            <button id="like-btn" onclick="handleLike()">
                                <i id="like-icon" class="far fa-heart text-xl text-gray-400 dark:text-gray-500 transition-colors"></i>
                                <span class="flex flex-col items-start">
                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none mb-0.5">Cảm ơn</span>
                                    <span id="like-count" class="font-extrabold text-[1rem] leading-none">0</span>
                                </span>
                            </button>
                            <div class="flex items-center gap-2">
                                <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mr-1">Chia sẻ</span>
                                <button onclick="shareX()" class="w-9 h-9 rounded-xl bg-[#1DA1F2]/10 text-[#1DA1F2] hover:bg-[#1DA1F2]/20 transition-colors flex items-center justify-center"><i class="fab fa-twitter text-sm"></i></button>
                                <button onclick="shareTG()" class="w-9 h-9 rounded-xl bg-[#0088cc]/10 text-[#0088cc] hover:bg-[#0088cc]/20 transition-colors flex items-center justify-center"><i class="fab fa-telegram-plane text-sm"></i></button>
                                <button onclick="shareFB()" class="w-9 h-9 rounded-xl bg-[#1877F2]/10 text-[#1877F2] hover:bg-[#1877F2]/20 transition-colors flex items-center justify-center"><i class="fab fa-facebook-f text-sm"></i></button>
                                <button onclick="copyLink()" class="w-9 h-9 rounded-xl bg-gray-100 dark:bg-white/5 text-gray-500 hover:bg-accent/10 hover:text-accent transition-colors flex items-center justify-center"><i class="fas fa-link text-sm"></i></button>
                            </div>
                        </div>
                    </div>

                    <!-- COMMENTS -->
                    <div class="cmt-section" id="cmt-sec">
                        <div class="cmt-head">
                            <div class="cmt-ico"><i class="fas fa-comments text-accent text-sm"></i></div>
                            <h3 class="cmt-title">Bình Luận</h3>
                            <span class="cmt-count-badge" id="cmt-badge">0</span>
                        </div>

                        <!-- Form -->
                        <div class="cmt-form">
                            <div class="cmt-form-top">
                                <div class="cmt-av" id="cmt-form-av">?</div>
                                <input id="cmt-name" type="text" placeholder="Tên của bạn..." class="cmt-name-in" oninput="syncAvatar(this.value)" autocomplete="off" maxlength="40">
                            </div>
                            <div class="cmt-div"></div>
                            <textarea id="cmt-text" class="cmt-ta" placeholder="Chia sẻ suy nghĩ của bạn về bài viết này..." rows="3" onkeydown="if(event.ctrlKey&&event.key==='Enter')doSubmit()"></textarea>
                            <div class="cmt-foot">
                                <p class="text-[11px] text-gray-400 font-medium flex items-center gap-1.5">
                                    <i class="fas fa-shield-check text-accent/60 text-xs"></i>
                                    Ẩn danh · Ctrl+Enter để gửi
                                </p>
                                <button class="cmt-sub" onclick="doSubmit()">
                                    <i class="fas fa-paper-plane text-[11px]"></i> Gửi bình luận
                                </button>
                            </div>
                        </div>

                        <!-- List -->
                        <div id="cmt-list"></div>
                        <div class="cmt-empty" id="cmt-empty">
                            <div class="cmt-empty-ico"><i class="fas fa-comment-dots text-accent/50 text-xl"></i></div>
                            <p class="font-bold text-gray-600 dark:text-gray-400 mb-1 font-sans">Chưa có bình luận</p>
                            <p class="text-sm text-gray-400 dark:text-gray-500 font-sans">Hãy là người đầu tiên chia sẻ suy nghĩ!</p>
                        </div>
                    </div>
                </div>

                <!-- SIDEBAR -->
                <div class="w-full lg:w-[255px] shrink-0 hidden lg:block">
                    <div class="sticky top-24 space-y-4">
                        <div class="sblock">
                            <h4 class="text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-1.5">
                                <i class="fas fa-list-ul text-accent/60 text-[9px]"></i> Mục lục
                            </h4>
                            <nav id="toc-desk" class="flex flex-col space-y-0.5"></nav>
                        </div>
                        <div class="sblock">
                            <div class="flex items-center justify-between mb-2.5">
                                <span class="text-[10px] font-extrabold text-gray-400 dark:text-gray-500 uppercase tracking-widest">Tiến độ đọc</span>
                                <span id="read-pct" class="text-[11px] font-extrabold text-accent tabular-nums">0%</span>
                            </div>
                            <div class="h-1.5 bg-gray-100 dark:bg-white/8 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-accent to-green-400 rounded-full transition-all duration-150" id="sb-prog" style="width:0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <script>
        let post=null,allPosts=[];
        let fs=parseFloat(localStorage.getItem('fontScale')||'1');
        document.documentElement.style.setProperty('--fs',fs);

        // ─ Theme ─
        function toggleTheme(){document.documentElement.classList.toggle('dark');localStorage.setItem('theme',document.documentElement.classList.contains('dark')?'dark':'light')}
        if(localStorage.getItem('theme')==='light')document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');

        // ─ Font size ─
        function changeFontSize(d){fs=Math.min(1.4,Math.max(.8,fs+d));localStorage.setItem('fontScale',fs.toFixed(1));document.documentElement.style.setProperty('--fs',fs)}

        // ─ Share dropdown ─
        function toggleShare(){document.getElementById('sdrop').classList.toggle('open')}
        document.addEventListener('click',e=>{if(!e.target.closest('#shbtn')&&!e.target.closest('#sdrop'))document.getElementById('sdrop').classList.remove('open')});

        // ─ Back to top ─
        window.addEventListener('scroll',()=>{document.getElementById('b2t').classList.toggle('v',window.scrollY>500)},{passive:true});

        // ─ TOC Drawer ─
        function openTOC(){document.getElementById('toc-drawer').classList.add('open');document.getElementById('toc-bd').classList.add('show');document.body.style.overflow='hidden'}
        function closeTOC(){document.getElementById('toc-drawer').classList.remove('open');document.getElementById('toc-bd').classList.remove('show');document.body.style.overflow=''}

        // ─ Scroll progress ─
        window.addEventListener('scroll',()=>{
            const h=document.documentElement.scrollHeight-document.documentElement.clientHeight;
            const p=h>0?Math.round(window.scrollY/h*100):0;
            document.getElementById('progress-bar').style.width=p+'%';
            document.getElementById('rstrip-fill').style.width=p+'%';
            const sp=document.getElementById('sb-prog'),rp=document.getElementById('read-pct');
            if(sp)sp.style.width=p+'%';if(rp)rp.textContent=p+'%';
            const st=document.getElementById('sticky-title');
            if(st)st.classList.toggle('opacity-0',window.scrollY<=450);
        },{passive:true});

        // ─ Share fns ─
        function shareX(){window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(post?.title||'')}&url=${encodeURIComponent(location.href)}`)}
        function shareTG(){window.open(`https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(post?.title||'')}`)}
        function shareFB(){window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`)}
        function copyLink(){navigator.clipboard.writeText(location.href);showToast('✓ Đã sao chép liên kết!');document.getElementById('sdrop').classList.remove('open')}

        // ─ Toast ─
        let toastTimer;
        function showToast(msg){
            clearTimeout(toastTimer);
            document.getElementById('toast-msg').textContent=msg;
            const t=document.getElementById('toast');
            t.classList.add('show');
            toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
        }

        // ─ Bookmark ─
        function toggleBookmark(){
            if(!post)return;
            const btn=document.getElementById('bkbtn'),ico=document.getElementById('bkicon');
            const saved=JSON.parse(localStorage.getItem('saved_posts')||'[]');
            const idx=saved.findIndex(s=>s.id==post.id);
            ico.style.animation='none';requestAnimationFrame(()=>{ico.style.animation='bkPop .38s cubic-bezier(.16,1,.3,1)'});
            if(idx===-1){saved.push({id:post.id,slug:post.slug,title:post.title,image:post.image||'',savedAt:Date.now()});ico.className='fas fa-bookmark text-xs';btn.classList.add('on');showToast('✓ Đã lưu vào danh sách đọc!')}
            else{saved.splice(idx,1);ico.className='far fa-bookmark text-xs';btn.classList.remove('on');showToast('Đã bỏ lưu bài viết')}
            localStorage.setItem('saved_posts',JSON.stringify(saved));
        }
        function checkBK(){
            if(!post)return;
            if(JSON.parse(localStorage.getItem('saved_posts')||'[]').some(s=>s.id==post.id)){document.getElementById('bkicon').className='fas fa-bookmark text-xs';document.getElementById('bkbtn').classList.add('on')}
        }
        const _bkStyle=document.createElement('style');
        _bkStyle.textContent='@keyframes bkPop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}';
        document.head.appendChild(_bkStyle);

        // ─ Highlight to share ─
        let hlT;
        document.addEventListener('mouseup',()=>{
            clearTimeout(hlT);
            hlT=setTimeout(()=>{
                const sel=window.getSelection(),text=sel?.toString().trim(),popup=document.getElementById('hlshare');
                if(text&&text.length>20&&text.length<280){
                    try{
                        const rc=sel.getRangeAt(0).getBoundingClientRect();
                        popup.style.display='flex';
                        popup.style.top=(rc.top+window.scrollY-46)+'px';
                        popup.style.left=Math.max(8,Math.min(rc.left+rc.width/2-80,window.innerWidth-200))+'px';
                        document.getElementById('hs-x').onclick=()=>{window.open(`https://twitter.com/intent/tweet?text=%22${encodeURIComponent(text)}%22%20${encodeURIComponent(location.href)}`);popup.style.display='none'};
                        document.getElementById('hs-tg').onclick=()=>{window.open(`https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=%22${encodeURIComponent(text)}%22`);popup.style.display='none'};
                        document.getElementById('hs-cp').onclick=()=>{navigator.clipboard.writeText(`"${text}" — ${location.href}`);showToast('✓ Đã sao chép trích dẫn!');popup.style.display='none'};
                    }catch(e){popup.style.display='none'}
                }else{popup.style.display='none'}
            },180);
        });
        document.addEventListener('mousedown',e=>{if(!e.target.closest('#hlshare'))document.getElementById('hlshare').style.display='none'});

        // ─ Helpers ─
        const fmtDate=d=>d?new Date(d).toLocaleDateString('vi-VN',{year:'numeric',month:'long',day:'numeric'}):'Mới đây';
        const getImg=i=>i?.trim()?i:'https://images.unsplash.com/photo-1639762681485-074b7f4fc8fd?q=80&w=1200';
        function esc(s){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

        function getMetrics(id){
            const n=Number(id)||1,k=`metrics_post_${n}`,now=Date.now();
            let m=JSON.parse(localStorage.getItem(k)||'null');
            if(!m){const s=(n*997)%10000;m={views:1200+s+(n%500),likes:120+Math.floor(s/10),lastUpdated:now}}
            else{const h=(now-m.lastUpdated)/3600000;if(h>=1){m.views+=Math.floor(h*(Math.random()*8+3));m.likes+=Math.floor(h*(Math.random()*2));m.lastUpdated=now}}
            localStorage.setItem(k,JSON.stringify(m));
            return{vf:m.views.toLocaleString('vi-VN'),lf:m.likes.toLocaleString('vi-VN'),rv:m.views,rl:m.likes};
        }

        function trackVisit(title,slug,id){
            try{
                const v=JSON.parse(localStorage.getItem('site_visits')||'[]');
                v.push({page:'post',title,slug,ts:Date.now()});
                if(v.length>2000)v.splice(0,v.length-2000);
                localStorage.setItem('site_visits',JSON.stringify(v));
                if(!sessionStorage.getItem('v'+id)){sessionStorage.setItem('v'+id,'1');const m=JSON.parse(localStorage.getItem(`metrics_post_${id}`));if(m){m.views++;localStorage.setItem(`metrics_post_${id}`,JSON.stringify(m))}}
            }catch(e){}
        }

        // ─ Load post ─
        async function loadPost(){
            const slug=new URLSearchParams(location.search).get('slug');
            try{
                const r=await fetch('./data/posts.json?v='+Date.now(),{cache:'no-store'});
                if(r.ok){const sp=await r.json();const lp=JSON.parse(localStorage.getItem('crypto_posts')||'[]');const sids=new Set(sp.map(p=>String(p.id)));allPosts=[...sp,...lp.filter(p=>p.status!=='published'&&!sids.has(String(p.id)))];localStorage.setItem('crypto_posts',JSON.stringify(allPosts))}
            }catch(e){try{allPosts=JSON.parse(localStorage.getItem('crypto_posts')||'[]')}catch(e){}}

            post=allPosts.find(p=>p.slug===slug);
            if(!post){
                document.getElementById('post-hd').style.display='none';
                document.getElementById('imgbox').classList.add('hidden');
                document.getElementById('post-body').innerHTML=`<div class="text-center py-32"><div class="text-7xl mb-6">👻</div><p class="text-red-500 font-extrabold text-3xl tracking-tight mb-3">404 — Rất tiếc!</p><p class="text-gray-500 font-serif mb-8">Bài viết này không tồn tại hoặc đã bị xóa.</p><a href="index.html" class="inline-block px-8 py-3 bg-accent text-black font-bold rounded-xl hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(0,229,143,.3)] transition-all">← Về trang chủ</a></div>`;
                document.getElementById('toc-trig').style.display='none';
                return;
            }

            let m=getMetrics(post.id);trackVisit(post.title,post.slug,post.id);m=getMetrics(post.id);
            document.title=`${post.title} — Trading Insight`;
            document.getElementById('sticky-title').textContent=post.title;
            document.getElementById('post-cat').textContent=post.category||'ARTICLE';
            document.getElementById('post-title').textContent=post.title;
            document.getElementById('post-author').textContent=post.author||'Trading Insight';
            document.getElementById('post-date').textContent=fmtDate(post.date);
            const wc=(post.content||'').trim().split(/\s+/).length,rm=Math.max(1,Math.ceil(wc/250));
            document.getElementById('post-rt').innerHTML=`<i class="far fa-clock text-accent/70"></i> ${rm} phút đọc`;
            document.getElementById('post-views').innerHTML=`<i class="far fa-eye text-accent"></i> ${m.vf}`;
            document.getElementById('post-likes-disp').innerHTML=`<i class="far fa-heart text-red-400"></i> ${m.lf}`;
            if(post.image){document.getElementById('post-img').src=post.image;document.getElementById('imgbox').classList.remove('hidden')}
            marked.setOptions({breaks:true,gfm:true});
            document.getElementById('post-body').innerHTML=marked.parse(post.content||'');
            addCopyBtns();
            if(post.tags?.length)document.getElementById('post-tags').innerHTML=post.tags.map(t=>`<span class="tag">#${esc(t.trim())}</span>`).join('');
            buildTOC();
            loadLikes(m.rl);
            renderRelated();
            renderComments(post.id);
            checkBK();
        }

        // ─ Copy code buttons ─
        function addCopyBtns(){
            document.querySelectorAll('.md pre').forEach(pre=>{
                const w=document.createElement('div');w.className='cbw';pre.parentNode.insertBefore(w,pre);w.appendChild(pre);
                const b=document.createElement('button');b.className='cpybtn';b.innerHTML='<i class="fas fa-copy"></i> Copy';
                b.onclick=()=>navigator.clipboard.writeText(pre.querySelector('code')?.innerText||pre.innerText).then(()=>{b.innerHTML='<i class="fas fa-check"></i> OK';b.classList.add('ok');setTimeout(()=>{b.innerHTML='<i class="fas fa-copy"></i> Copy';b.classList.remove('ok')},2000)});
                w.appendChild(b);
            });
        }

        // ─ Like ─
        let likeTotal=0;
        function loadLikes(raw){
            likeTotal=raw;document.getElementById('like-count').textContent=raw.toLocaleString('vi-VN');
            if(localStorage.getItem(`liked_${post.id}`)){document.getElementById('like-btn').classList.add('liked');document.getElementById('like-icon').className='fas fa-heart text-xl text-red-500'}
        }
        function handleLike(){
            if(localStorage.getItem(`liked_${post.id}`))return;
            localStorage.setItem(`liked_${post.id}`,'1');
            const m=JSON.parse(localStorage.getItem(`metrics_post_${post.id}`));
            if(m){m.likes++;localStorage.setItem(`metrics_post_${post.id}`,JSON.stringify(m));likeTotal=m.likes}else likeTotal++;
            document.getElementById('like-icon').className='fas fa-heart text-xl hpop text-red-500';
            document.getElementById('like-btn').classList.add('liked');
            document.getElementById('like-count').textContent=likeTotal.toLocaleString('vi-VN');
            document.getElementById('post-likes-disp').innerHTML=`<i class="fas fa-heart text-red-400"></i> ${likeTotal.toLocaleString('vi-VN')}`;
            burstHearts();
        }
        function burstHearts(){
            const r=document.getElementById('like-btn').getBoundingClientRect();
            for(let i=0;i<8;i++){const h=document.createElement('div');h.innerHTML='❤️';h.style.cssText=`position:fixed;left:${r.left+r.width/2}px;top:${r.top+10}px;font-size:${12+Math.random()*16}px;pointer-events:none;z-index:9999;animation:fh 1s ease-out forwards;transform:translateX(${(Math.random()-.5)*100}px)`;document.body.appendChild(h);setTimeout(()=>h.remove(),1000)}
        }
        const _fh=document.createElement('style');_fh.textContent='@keyframes fh{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}';document.head.appendChild(_fh);

        // ─ Related ─
        function renderRelated(){
            const rel=allPosts.filter(p=>p.slug!==post.slug&&p.status==='published'&&(p.category===post.category||(p.tags&&post.tags&&p.tags.some(t=>post.tags.includes(t))))).slice(0,3);
            if(!rel.length)return;
            const d=document.createElement('div');d.className='mt-14 pt-10 border-t border-gray-100 dark:border-white/[0.06]';
            d.innerHTML=`<h3 class="text-lg font-extrabold mb-5 flex items-center gap-2.5 font-sans"><i class="fas fa-layer-group text-accent text-base"></i> Bài Viết Đề Xuất</h3><div class="grid grid-cols-1 sm:grid-cols-3 gap-4">${rel.map(p=>{const m=getMetrics(p.id);const rt=Math.max(1,Math.ceil((p.content||'').trim().split(/\s+/).length/250));return`<a href="post.html?slug=${p.slug}" class="rel-card group"><div class="aspect-[16/9] overflow-hidden relative"><img src="${getImg(p.image)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"><div class="absolute top-2 left-2 bg-black/60 text-white text-[9px] font-bold px-2 py-0.5 rounded-md backdrop-blur-sm uppercase tracking-wider">${p.category||'TIN TỨC'}</div><div class="absolute top-2 right-2 bg-black/60 text-white text-[9px] font-bold px-2 py-0.5 rounded-md backdrop-blur-sm">${rt}p</div></div><div class="p-4"><h4 class="font-extrabold text-sm leading-snug line-clamp-2 mb-2.5 group-hover:text-accent transition-colors font-sans">${p.title}</h4><div class="flex gap-3 text-[11px] text-gray-400 font-semibold"><span><i class="far fa-eye text-accent/70 mr-1"></i>${m.vf}</span><span><i class="far fa-heart text-red-400/70 mr-1"></i>${m.lf}</span></div></div></a>`}).join('')}</div>`;
            document.getElementById('main-col').appendChild(d);
        }

        // ─ TOC ─
        function buildTOC(){
            const hh=document.querySelectorAll('.md h2,.md h3'),td=document.getElementById('toc-desk'),tm=document.getElementById('toc-mob');
            if(!hh.length){td.innerHTML='<span class="text-xs text-gray-500 italic">Không có mục lục</span>';document.getElementById('toc-trig').style.display='none';return}
            hh.forEach((h,i)=>{
                h.id=`h${i}`;
                const mk=()=>{const a=document.createElement('a');a.href=`#h${i}`;a.textContent=h.textContent;a.className=`toc-a ${h.tagName==='H3'?'ml-3 text-[11px] opacity-80':''}`;return a};
                const a1=mk();a1.addEventListener('click',e=>{e.preventDefault();window.scrollTo({top:h.getBoundingClientRect().top+window.scrollY-90,behavior:'smooth'})});td.appendChild(a1);
                const a2=mk();a2.addEventListener('click',e=>{e.preventDefault();closeTOC();setTimeout(()=>window.scrollTo({top:h.getBoundingClientRect().top+window.scrollY-80,behavior:'smooth'}),300)});tm.appendChild(a2);
            });
            window.addEventListener('scroll',()=>{let c='';hh.forEach(h=>{if(window.scrollY>=h.offsetTop-120)c=h.id});document.querySelectorAll('.toc-a').forEach(a=>a.classList.toggle('on',a.getAttribute('href')==='#'+c))},{passive:true});
        }

        // ─ Comments ─
        function getCmts(pid){try{return JSON.parse(localStorage.getItem(`c_${pid}`)||'[]')}catch(e){return[]}}
        function saveCmts(pid,arr){localStorage.setItem(`c_${pid}`,JSON.stringify(arr))}

        function str2col(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return`hsl(${Math.abs(h)%360},60%,52%)`}

        function fmtCmtDate(ts){const d=Date.now()-ts;if(d<60000)return'Vừa xong';if(d<3600000)return Math.floor(d/60000)+' phút trước';if(d<86400000)return Math.floor(d/3600000)+' giờ trước';if(d<604800000)return Math.floor(d/86400000)+' ngày trước';return new Date(ts).toLocaleDateString('vi-VN')}

        function syncAvatar(v){const av=document.getElementById('cmt-form-av');const ch=(v||'').trim().charAt(0).toUpperCase()||'?';av.textContent=ch;av.style.background=ch!='?'?str2col(v)+'18':'rgba(0,229,143,.1)';av.style.color=ch!='?'?str2col(v):'#00e58f'}

        function renderComments(pid){
            const cmts=getCmts(pid),list=document.getElementById('cmt-list'),empty=document.getElementById('cmt-empty'),badge=document.getElementById('cmt-badge');
            if(badge)badge.textContent=cmts.length;
            if(!cmts.length){list.innerHTML='';empty.style.display='block';return}
            empty.style.display='none';
            list.innerHTML=cmts.slice().reverse().map(c=>{
                const ini=(c.name||'A').trim().charAt(0).toUpperCase();const col=str2col(c.name||'A');
                const lk=localStorage.getItem(`cl_${c.id}`);const lc=c.likes||0;
                return`<div class="cmt-card"><div class="cmt-card-hd"><div class="flex items-center gap-2.5"><div class="cmt-card-av" style="background:${col}18;color:${col}">${ini}</div><div><p class="cmt-card-name">${esc(c.name||'Ẩn danh')}</p><p class="cmt-card-time">${fmtCmtDate(c.date)}</p></div></div></div><p class="cmt-card-text">${esc(c.text)}</p><div class="cmt-actions"><button class="cmt-act ${lk?'lkd':''}" onclick="likeCmt(${c.id},this)"><i class="${lk?'fas':'far'} fa-heart"></i><span class="clc">${lc||'Thích'}</span></button><button class="cmt-act" onclick="replyTo('${esc(c.name||'Ẩn danh')}')"><i class="far fa-reply"></i> Trả lời</button></div></div>`
            }).join('');
        }

        function likeCmt(id,btn){
            const k=`cl_${id}`;if(localStorage.getItem(k))return;
            localStorage.setItem(k,'1');
            if(!post)return;
            const cmts=getCmts(post.id),idx=cmts.findIndex(c=>c.id===id);
            if(idx!==-1){cmts[idx].likes=(cmts[idx].likes||0)+1;saveCmts(post.id,cmts)}
            btn.classList.add('lkd');btn.querySelector('i').className='fas fa-heart';
            const s=btn.querySelector('.clc');s.textContent=parseInt(s.textContent)||0?(parseInt(s.textContent)+1):'1';
        }

        function replyTo(name){
            const ta=document.getElementById('cmt-text');ta.value=`@${name} `;ta.focus();ta.scrollIntoView({behavior:'smooth',block:'center'});
        }

        function doSubmit(){
            if(!post)return;
            const name=document.getElementById('cmt-name').value.trim()||'Ẩn danh';
            const text=document.getElementById('cmt-text').value.trim();
            if(!text){document.getElementById('cmt-text').focus();return}
            const cmts=getCmts(post.id);cmts.push({id:Date.now(),name,text,date:Date.now(),likes:0});
            saveCmts(post.id,cmts);document.getElementById('cmt-text').value='';
            renderComments(post.id);showToast('✓ Đã đăng bình luận!');
        }

        loadPost();
    </script>
</body>
</html>
